<script>
(function(){
 const svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#61d98b"/><stop offset="1" stop-color="#08773f"/></linearGradient></defs><rect width="512" height="512" rx="118" fill="#f3fbef"/><rect x="128" y="108" width="256" height="296" rx="70" fill="url(#g)"/><rect x="168" y="151" width="176" height="210" rx="43" fill="#fff" opacity=".22"/><path d="M260 166c-58 0-102 42-102 97 0 60 45 96 102 96s102-36 102-96c0-55-44-97-102-97Zm0 51c28 0 48 18 48 45 0 29-20 45-48 45s-48-16-48-45c0-27 20-45 48-45Z" fill="#fff" opacity=".92"/></svg>';
 const icon='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));
 document.write('<link rel="apple-touch-icon" href="'+icon+'">');
 const mani={name:'めい家計簿',short_name:'家計簿',display:'standalone',background_color:'#f1faef',theme_color:'#75c99a',icons:[{src:icon,sizes:'512x512',type:'image/svg+xml'}]};
 document.write('<link rel="manifest" href="data:application/manifest+json;base64,'+btoa(unescape(encodeURIComponent(JSON.stringify(mani))))+'">');
})();
</script>
<style>
:root{--g0:#f7fcf6;--g1:#edf8ee;--g2:#d9f0de;--g3:#a8ddb8;--g4:#75c99a;--g5:#3fae72;--g6:#22684b;--ink:#173d2d;--muted:#71877c;--line:#dcefe1;--white:#fff;--danger:#c93b3b;--dangerbg:#fff1f1;--shadow:0 12px 28px rgba(49,118,80,.10)}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f0faf0,#fbfef9 45%,#eef9ef);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Maru Gothic ProN","Yu Gothic UI","Yu Gothic","Noto Sans TC","Noto Sans JP",sans-serif;color:var(--ink);font-weight:500}.app{max-width:480px;margin:0 auto;min-height:100dvh;padding-bottom:calc(100px + env(safe-area-inset-bottom));position:relative}.hero{position:relative;padding:calc(10px + env(safe-area-inset-top)) 16px 14px;background:radial-gradient(circle at 12% 18%,rgba(255,255,255,.40),transparent 25%),linear-gradient(135deg,#8bd8a8,#3dae74 55%,#2d9865);color:white;border-bottom-left-radius:26px;border-bottom-right-radius:26px;box-shadow:0 10px 22px rgba(49,118,80,.13);overflow:hidden}.hero:after{content:"";position:absolute;right:-36px;bottom:-54px;width:122px;height:122px;border:2px solid rgba(255,255,255,.18);border-radius:50%}.toprow{display:flex;align-items:center;gap:11px}.logo{width:44px;height:44px;border-radius:17px;background:white;display:grid;place-items:center;box-shadow:0 7px 15px rgba(0,0,0,.10)}.logo i{width:24px;height:29px;border-radius:10px;display:block;background:linear-gradient(135deg,#d2f0dc,#69be8e);box-shadow:inset 0 0 0 8px rgba(255,255,255,.55)}h1{margin:0;font-size:20px;letter-spacing:.02em;font-weight:650} .sub{margin-top:2px;font-size:11.5px;font-weight:500;opacity:.9}.monthpill{margin:12px auto 0;width:56%;height:38px;border-radius:24px;border:1.5px solid rgba(255,255,255,.23);display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);font-size:15px;font-weight:650}.monthpill button{border:0;background:rgba(255,255,255,.17);color:white;width:29px;height:29px;border-radius:50%;font-size:16px}.page{display:none;padding:18px}.page.active{display:block}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.card{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px}.mini{padding:13px}.label{font-size:12.5px;color:var(--g6);opacity:.9}.amount{font-size:17px;color:var(--g6);margin-top:6px}.amount.red{color:var(--danger)}.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:17px;color:var(--g6)}.muted{color:var(--muted);font-size:12px;font-weight:500}.progress{height:14px;background:#e2eee2;border-radius:99px;overflow:hidden;margin:10px 0}.bar{height:100%;background:linear-gradient(90deg,#b1e3bd,#55bd84);border-radius:99px;width:0}.notice{border:1.5px solid #92d4a5;background:linear-gradient(135deg,#ecfaee,#f7fff8);padding:14px 14px;border-radius:18px;line-height:1.65;color:var(--g6)}.notice.danger{background:var(--dangerbg);border-color:#e99494;color:#9e2222}.btn{border:0;background:linear-gradient(135deg,#78cfa0,#3fac74);color:#fff;border-radius:18px;padding:13px 16px;font-size:14px;font-weight:650;box-shadow:0 10px 18px rgba(15,145,86,.22)}.btn.ghost{background:#eef9ee;color:var(--g6);border:1px solid #bde3c5;box-shadow:none}.btn.danger{background:#fff1f1;color:#b62c2c;border:1px solid #eeb0b0;box-shadow:none}.form-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#eaf6ea;border-radius:20px;padding:6px;margin-bottom:16px}.form-tabs button{border:0;border-radius:15px;padding:12px;background:transparent;color:var(--g6);font-size:14px;font-weight:650}.form-tabs button.active{background:var(--white);box-shadow:0 8px 18px rgba(7,94,57,.12)}label{display:block;margin:12px 0 7px;color:var(--g6);font-size:13px;font-weight:500}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:13px 14px;font:inherit;font-size:14px;font-weight:500;background:white;color:var(--ink)}textarea{min-height:80px}.cats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.cat{padding:12px;border:1px solid var(--line);background:white;border-radius:16px;text-align:left;color:#087347}.cat.active{border:2px solid var(--g4);background:#edf9ef}.dot{display:inline-block;width:12px;height:12px;border-radius:50%;background:#8dcf99;margin-right:8px}.record{display:flex;align-items:center;gap:12px;border-bottom:1px solid #e5eee7;padding:12px 0}.record:last-child{border-bottom:0}.badge{width:34px;height:34px;border-radius:50%;background:#dff4e4;display:grid;place-items:center;color:var(--g6);font-size:0}.badge:before{content:"";width:16px;height:16px;border-radius:5px;background:var(--g4)}.grow{flex:1}.del{border:0;background:#eef6ef;color:var(--muted);border-radius:12px;padding:8px 10px;font-weight:650}.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(480px,100%);height:calc(90px + env(safe-area-inset-bottom));padding:8px 10px calc(7px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid rgba(220,239,225,.70);display:grid;grid-template-columns:repeat(5,1fr);align-items:center;gap:2px;z-index:5;box-shadow:0 -8px 22px rgba(43,103,74,.055)}.nav button{appearance:none;-webkit-appearance:none;border:0;background:transparent;color:#74847d;width:100%;height:66px;border-radius:20px;font-weight:500;font-size:11px;letter-spacing:.01em;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;line-height:1;position:relative;-webkit-tap-highlight-color:transparent;transition:transform .16s ease,background .16s ease,color .16s ease}.nav button.active:not(.nav-add){background:#f0faef;color:#25aa6a;border:1.2px solid #d8efd9;box-shadow:inset 0 1px 0 rgba(255,255,255,.88)}.nav button:active{transform:scale(.97)}.nav-ico{width:24px;height:24px;display:grid;place-items:center;color:currentColor}.nav-ico svg{width:100%;height:100%;display:block;fill:none;stroke:currentColor;stroke-width:2.55;stroke-linecap:round;stroke-linejoin:round}.nav-label{display:block;font-size:11px;font-weight:500;line-height:1;color:currentColor;white-space:nowrap}.nav-add{color:#75877e;justify-content:flex-start;gap:5px;padding-top:0}.nav-add .nav-ico{width:50px;height:50px;margin-top:-15px;border-radius:50%;color:#fff;background:linear-gradient(180deg,#35b978 0%,#168c59 100%);box-shadow:0 14px 26px rgba(36,153,99,.22),0 0 0 10px rgba(84,199,136,.09),0 0 26px rgba(56,184,119,.31),inset 0 2px 4px rgba(255,255,255,.30),inset 0 -5px 10px rgba(12,97,59,.16)}.nav-add .nav-ico svg{width:30px;height:30px;stroke-width:3}.nav-add .nav-label{color:#74877d;font-size:11px;font-weight:500;margin-top:0}.nav button:not(.active):not(.nav-add) .nav-ico{opacity:.92}.nav button:not(.active):not(.nav-add) .nav-label{color:#7d8c86}.nav button.active:not(.nav-add) .nav-ico svg{stroke-width:2.65}
.account-item{display:flex;align-items:center;gap:13px;border-bottom:1px solid #e4eee6;padding:14px 0}.coin{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#addfbb,#51b27c);display:grid;place-items:center;color:white}.coin:before{content:"";width:17px;height:17px;border:3px solid #fff;border-radius:5px}.pillrow{display:flex;gap:8px;flex-wrap:wrap}.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{min-height:58px;background:white;border:1px solid var(--line);border-radius:14px;padding:6px;font-size:12px}.day.today{border:2px solid var(--g4)}.day b{display:block}.tiny{font-size:9.5px;margin-top:5px}.green{color:var(--g5)}.redtext{color:var(--danger)}
</style>
</head>
<body><div class="app">
<header class="hero"><div class="toprow"><div class="logo"><i></i></div><div><h1>めい家計簿</h1><div class="sub">貯金を守る、毎日の小さな作戦ノート</div></div></div><div class="monthpill"><button id="prevM">‹</button><span id="monthLabel">2026年6月</span><button id="nextM">›</button></div></header>
<main>
<section id="home" class="page active"></section>
<section id="calendar" class="page"></section>
<section id="input" class="page"></section>
<section id="analysis" class="page"></section>
<section id="settings" class="page"></section>
</main>
<nav class="nav" aria-label="底部導覽列"><button data-page="home" class="active"><span class="nav-ico" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M5.8 15.2 16 6.7l10.2 8.5"/><path d="M8.4 14.1v10.5c0 .8.6 1.4 1.4 1.4h12.4c.8 0 1.4-.6 1.4-1.4V14.1"/><path d="M13.1 26v-7.1h5.8V26"/></svg></span><span class="nav-label">ホーム</span></button><button data-page="calendar"><span class="nav-ico" aria-hidden="true"><svg viewBox="0 0 32 32"><rect x="6.1" y="7.9" width="19.8" height="18.1" rx="3.2"/><path d="M10.9 5.7v4.4M21.1 5.7v4.4M6.1 13h19.8"/><path d="M11.2 17.7h.1M16 17.7h.1M20.8 17.7h.1M11.2 22h.1M16 22h.1"/></svg></span><span class="nav-label">カレンダー</span></button><button data-page="input" class="nav-add"><span class="nav-ico" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M16 7.4v17.2M7.4 16h17.2"/></svg></span><span class="nav-label">入力</span></button><button data-page="analysis"><span class="nav-ico" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M16 5.8a10.2 10.2 0 1 0 10.2 10.2H16Z"/><path d="M18.6 5.8v7.6h7.6a10.2 10.2 0 0 0-7.6-7.6Z"/></svg></span><span class="nav-label">分析</span></button><button data-page="settings"><span class="nav-ico" aria-hidden="true"><svg viewBox="0 0 32 32"><path d="M13.6 5.7h4.8l.7 3a8.8 8.8 0 0 1 2 1.1l2.9-.9 2.4 4.2-2.2 2.1c.1.5.1 1 .1 1.5s0 1-.1 1.5l2.2 2.1-2.4 4.2-2.9-.9a8.8 8.8 0 0 1-2 1.1l-.7 3h-4.8l-.7-3a8.8 8.8 0 0 1-2-1.1l-2.9.9-2.4-4.2 2.2-2.1c-.1-.5-.1-1-.1-1.5s0-1 .1-1.5l-2.2-2.1L8 8.9l2.9.9a8.8 8.8 0 0 1 2-1.1Z"/><circle cx="16" cy="16" r="3.9"/></svg></span><span class="nav-label">設定</span></button></nav>
</div>
<script>
const KEY='mei_kakeibo_single_v5';
const outCats=['食費','推し活','生活費','交通','美容','交際費','医療','サブスク','チケット','代行','お菓子','その他'];
const inCats=['給料','ボーナス','バイト','業績賞与','賞金','臨時収入','返金','その他'];
let state={entries:[],accounts:[{name:'現金',currency:'TWD',balance:0},{name:'国泰世華銀行',currency:'TWD',balance:0},{name:'将来銀行',currency:'TWD',balance:0}],settings:{mealLimit:150,payday:10,goal:null,foodBudget:0,lifeBudget:0,liveName:'',liveDate:''},ym:new Date().toISOString().slice(0,7),inputType:'expense'};
function load(){try{const raw=localStorage.getItem(KEY); if(raw){state={...state,...JSON.parse(raw)}; state.settings={mealLimit:150,payday:10,goal:null,foodBudget:0,lifeBudget:0,liveName:'',liveDate:'',...state.settings};}}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){alert('保存できませんでした。');}}
function yen(n){return 'NT$'+Math.round(Number(n)||0).toLocaleString('en-US')}
function today(){return new Date().toISOString().slice(0,10)}
function monthEntries(){return state.entries.filter(e=>e.date&&e.date.slice(0,7)===state.ym)}
function dayEntries(d){return state.entries.filter(e=>e.date===d)}
function sum(arr,type){return arr.filter(e=>!type||e.type===type).reduce((a,e)=>a+Number(e.amount||0),0)}
function switchPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===p));render();}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>switchPage(b.dataset.page));
document.getElementById('prevM').onclick=()=>{let d=new Date(state.ym+'-01');d.setMonth(d.getMonth()-1);state.ym=d.toISOString().slice(0,7);render();};
document.getElementById('nextM').onclick=()=>{let d=new Date(state.ym+'-01');d.setMonth(d.getMonth()+1);state.ym=d.toISOString().slice(0,7);render();};
function render(){document.getElementById('monthLabel').textContent=state.ym.replace('-','年')+'月';renderHome();renderInput();renderAnalysis();renderSettings();renderCalendar();}
function renderHome(){const m=monthEntries(), inc=sum(m,'income'), exp=sum(m,'expense'), bal=inc-exp; const foodToday=sum(dayEntries(today()).filter(e=>e.type==='expense'&&e.cat==='食費')); const lim=Number(state.settings.mealLimit)||150; const pct=Math.min(100,lim?foodToday/lim*100:0); const liveName=(state.settings.liveName||'').trim(); const liveDate=state.settings.liveDate||''; const daysToLive=liveDate?Math.ceil((new Date(liveDate+'T00:00:00')-new Date(today()+'T00:00:00'))/86400000):null; const goal=Number(state.settings.goal||0); const remainGoal=goal?Math.max(0,goal-bal):0; const rec=[...state.entries].sort((a,b)=>(b.date+b.id).localeCompare(a.date+a.id)).slice(0,4);
 document.getElementById('home').innerHTML=`<div class="grid3"><div class="card mini"><div class="label">今月の収入</div><div class="amount">${yen(inc)}</div></div><div class="card mini"><div class="label">今月の支出</div><div class="amount red">${yen(exp)}</div></div><div class="card mini"><div class="label">今月の収支</div><div class="amount ${bal<0?'red':''}">${yen(bal)}</div></div></div>
 <div class="card"><div class="section-title"><span>今日の食費チェック</span><span class="muted">${yen(foodToday)} / ${yen(lim)}</span></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="notice ${foodToday>lim?'danger':''}">${foodToday>lim?`警告：食費上限を${yen(foodToday-lim)}超過しています。今日はこれ以上の外食・お菓子・飲み物購入は禁止レベルです。明日以降で必ず補回収しましょう。`:`まだ${yen(lim-foodToday)}使えます。ここで止められたら、貯金体質にかなり近づきます。`}</div></div>
 <div class="card"><div class="section-title"><span>貯金目標</span><button class="btn ghost" onclick="switchPage('settings')">目標を設定する</button></div>${goal?`<div class="split"><div class="notice"><div class="muted">今月の目標</div><div class="amount">${yen(goal)}</div></div><div class="notice"><div class="muted">目標まであと</div><div class="amount">${yen(remainGoal)}</div></div></div><div class="notice" style="margin-top:12px">給料日前までの残り日数に合わせて、食費・生活費の目安を自動調整します。無理な月は目標を削除して翌月から再設定できます。</div>`:`<div class="notice">まだ目標は未設定です。月の途中なら、無理に設定しなくて大丈夫。次の給料日から本気モードにしましょう。</div>`}</div>
 <div class="card"><div class="section-title"><span>次の予定まであと</span>${liveDate?`<span class="muted">${liveDate}</span>`:''}</div><div class="notice">${liveDate?`${daysToLive<0?'<div>予定日を過ぎています</div>':`<div class="amount">あと ${daysToLive} 日</div>`}<div class="muted">${liveName||'ライブ名未設定'}</div>`:'ライブ予定はまだ未設定です。設定ページから登録できます。'}</div></div>
 <div class="card"><div class="section-title"><span>最近の記録</span><button class="btn ghost" onclick="switchPage('calendar')">すべて見る</button></div>${rec.length?rec.map(r=>recordHTML(r)).join(''):'<div class="notice">まだ記録がありません。「入力」から最初の記録をつけてみましょう。</div>'}</div>`;}
function recordHTML(r){return `<div class="record"><span class="badge"></span><div class="grow"><div>${r.cat}</div><div class="muted">${r.memo||'メモなし'}・${r.account||''}・${r.date}</div></div><div class="${r.type==='expense'?'redtext':'green'}">${r.type==='expense'?'-':'+'}${yen(r.amount)}</div><button class="del" onclick="delEntry('${r.id}')">削除</button></div>`}
function renderInput(){const cats=state.inputType==='income'?inCats:outCats;document.getElementById('input').innerHTML=`<div class="card"><div class="form-tabs"><button class="${state.inputType==='expense'?'active':''}" onclick="state.inputType='expense';renderInput()">支出</button><button class="${state.inputType==='income'?'active':''}" onclick="state.inputType='income';renderInput()">収入</button></div><label>金額</label><input id="amt" type="number" inputmode="numeric" placeholder="例：150"><label>カテゴリー</label><div class="cats">${cats.map((c,i)=>`<button class="cat ${i===0?'active':''}" data-cat="${c}" onclick="document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));this.classList.add('active')"><span class="dot"></span>${c}</button>`).join('')}</div><label>日付</label><input id="date" type="date" value="${today()}"><label>メモ</label><textarea id="memo" placeholder="空白でもOK"></textarea><label>アカウント</label><select id="acc">${state.accounts.map(a=>`<option>${a.name}</option>`).join('')}</select><button class="btn" style="width:100%;margin-top:18px" onclick="addEntry()">追加する</button><div id="cheer" class="notice" style="margin-top:12px;display:none"></div></div>`;}
function addEntry(){const amount=Number(document.getElementById('amt').value);if(!amount||amount<0){alert('金額を入力してください。');return;}const cat=document.querySelector('.cat.active').dataset.cat;const e={id:Date.now().toString(36),type:state.inputType,amount,cat,date:document.getElementById('date').value||today(),memo:document.getElementById('memo').value.trim(),account:document.getElementById('acc').value};state.entries.push(e);const acc=state.accounts.find(a=>a.name===e.account);if(acc){acc.balance=Number(acc.balance||0)+(e.type==='income'?amount:-amount);}save();document.getElementById('amt').value='';document.getElementById('memo').value='';const msgs=['えらい。記録できた時点で、もう半分勝ちです。','ここで見える化できる人は強いで。','今日の自分、ちゃんとお金を守ってます。','小さな記録が未来の安心になります。'];const box=document.getElementById('cheer');box.style.display='block';box.textContent=msgs[Math.floor(Math.random()*msgs.length)];render();switchPage('input');}
function delEntry(id){const e=state.entries.find(x=>x.id===id);if(!e)return;if(confirm('この記録を削除しますか？')){const acc=state.accounts.find(a=>a.name===e.account);if(acc){acc.balance=Number(acc.balance||0)-(e.type==='income'?e.amount:-e.amount);}state.entries=state.entries.filter(x=>x.id!==id);save();render();}}
function renderAnalysis(){const m=monthEntries(), exp=sum(m,'expense'), inc=sum(m,'income');let by={};m.filter(e=>e.type==='expense').forEach(e=>by[e.cat]=(by[e.cat]||0)+Number(e.amount));const rows=outCats.map(c=>{const v=by[c]||0,p=exp?Math.round(v/exp*100):0;return `<div style="margin:12px 0"><div style="display:flex;justify-content:space-between"><span>${c}</span><span>${yen(v)}・${p}%</span></div><div class="progress"><div class="bar" style="width:${p}%"></div></div></div>`}).join('');document.getElementById('analysis').innerHTML=`<div class="card"><div class="section-title"><span>今月の分析</span><span class="muted">${state.ym}</span></div><div class="split"><div class="notice"><div class="muted">収入</div><div class="amount">${yen(inc)}</div></div><div class="notice"><div class="muted">支出</div><div class="amount red">${yen(exp)}</div></div></div></div><div class="card"><div class="section-title"><span>支出カテゴリー比率</span></div>${rows}</div>`}
function renderCalendar(){const [y,m]=state.ym.split('-').map(Number);const first=new Date(y,m-1,1);const last=new Date(y,m,0).getDate();let cells='';for(let i=0;i<first.getDay();i++)cells+='<div></div>';for(let d=1;d<=last;d++){const ds=`${state.ym}-${String(d).padStart(2,'0')}`;const arr=dayEntries(ds);const inc=sum(arr,'income'),exp=sum(arr,'expense');cells+=`<div class="day ${ds===today()?'today':''}"><b>${d}</b><div class="tiny green">+${inc?yen(inc):''}</div><div class="tiny redtext">-${exp?yen(exp):''}</div></div>`}const list=[...monthEntries()].sort((a,b)=>b.date.localeCompare(a.date)).map(recordHTML).join('');document.getElementById('calendar').innerHTML=`<div class="card"><div class="section-title"><span>カレンダー</span><span class="muted">日別の収入・支出</span></div><div class="calgrid"><b>日</b><b>月</b><b>火</b><b>水</b><b>木</b><b>金</b><b>土</b>${cells}</div></div><div class="card"><div class="section-title"><span>今月の記録</span></div>${list||'<div class="notice">記録がありません。</div>'}</div>`}
function renderSettings(){const net=state.accounts.reduce((a,x)=>a+Number(x.balance||0),0);document.getElementById('settings').innerHTML=`<div class="card"><div class="section-title"><span>アカウント</span><span class="muted">現金・銀行・カード別</span></div><div style="text-align:center;margin:4px 0 18px"><div class="amount">${yen(net)}</div><div class="muted">純資産</div></div>${state.accounts.map((a,i)=>`<div class="account-item"><span class="coin"></span><div class="grow"><div>${a.name}</div><div class="muted">${a.currency||'TWD'}</div></div><div class="amount" style="font-size:20px">${yen(a.balance)}</div><button class="del" onclick="editAccount(${i})">編集</button><button class="del" onclick="delAccount(${i})">削除</button></div>`).join('')}<div class="split" style="margin-top:14px"><input id="accName" placeholder="例：玉山銀行"><input id="accBal" type="number" placeholder="残高"></div><button class="btn" style="width:100%;margin-top:12px" onclick="addAccount()">アカウントを追加</button></div>
 <div class="card"><div class="section-title"><span>目標と上限</span><span class="muted">いつでも変更OK</span></div><div class="split"><div><label>1日の食費上限</label><input id="mealLimit" type="number" value="${state.settings.mealLimit}"></div><div><label>給料日</label><input id="payday" type="number" value="${state.settings.payday}"></div></div><label>月の貯金目標</label><input id="goal" type="number" placeholder="未設定" value="${state.settings.goal||''}"><div class="split"><div><label>月の食費予算</label><input id="foodBudget" type="number" value="${state.settings.foodBudget||''}"></div><div><label>月の生活費予算</label><input id="lifeBudget" type="number" value="${state.settings.lifeBudget||''}"></div></div><div class="pillrow" style="margin-top:16px"><button class="btn" onclick="saveSettings()">設定を保存</button><button class="btn danger" onclick="clearGoal()">目標を削除</button></div></div>
 <div class="card"><div class="section-title"><span>ライブ予定</span><span class="muted">ホームに表示</span></div><label>ライブ名</label><input id="liveName" type="text" placeholder="例：なにわ男子 横アリ" value="${state.settings.liveName||''}"><label>ライブ日</label><input id="liveDate" type="date" value="${state.settings.liveDate||''}"><div class="pillrow" style="margin-top:16px"><button class="btn" onclick="saveLiveSettings()">ライブ予定を保存</button><button class="btn ghost" onclick="clearLiveSettings()">未設定に戻す</button></div><div class="notice" style="margin-top:12px">保存すると、ホームのカウントダウンカードにライブ名と残り日数が表示されます。</div></div>
 <div class="card"><div class="section-title"><span>データ</span><span class="muted">バックアップ推奨</span></div><div class="pillrow"><button class="btn ghost" onclick="backup()">JSONバックアップ</button><button class="btn ghost" onclick="exportCSV()">CSV出力</button><button class="btn ghost" onclick="document.getElementById('restore').click()">JSON復元</button><input id="restore" type="file" accept="application/json" style="display:none" onchange="restoreJSON(this)"></div></div>`}
function addAccount(){const n=document.getElementById('accName').value.trim();const b=Number(document.getElementById('accBal').value||0);if(!n){alert('アカウント名を入力してください。');return;}state.accounts.push({name:n,currency:'TWD',balance:b});save();render();}
function editAccount(i){const a=state.accounts[i];const n=prompt('アカウント名',a.name);if(n===null)return;const b=prompt('残高',a.balance);if(b===null)return;a.name=n.trim()||a.name;a.balance=Number(b)||0;save();render();}
function delAccount(i){if(confirm('このアカウントを削除しますか？記録自体は残ります。')){state.accounts.splice(i,1);save();render();}}
function saveSettings(){state.settings.mealLimit=Number(document.getElementById('mealLimit').value)||150;state.settings.payday=Number(document.getElementById('payday').value)||10;state.settings.goal=Number(document.getElementById('goal').value)||null;state.settings.foodBudget=Number(document.getElementById('foodBudget').value)||0;state.settings.lifeBudget=Number(document.getElementById('lifeBudget').value)||0;const ln=document.getElementById('liveName');const ld=document.getElementById('liveDate');if(ln)state.settings.liveName=ln.value.trim();if(ld)state.settings.liveDate=ld.value;save();render();switchPage('home');}
function saveLiveSettings(){state.settings.liveName=document.getElementById('liveName').value.trim();state.settings.liveDate=document.getElementById('liveDate').value;save();render();switchPage('home');}
function clearLiveSettings(){state.settings.liveName='';state.settings.liveDate='';save();render();}
function clearGoal(){if(confirm('貯金目標を削除しますか？')){state.settings.goal=null;state.settings.foodBudget=0;state.settings.lifeBudget=0;save();render();}}
function backup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});download(blob,'mei-kakeibo-backup.json')}
function exportCSV(){const header='type,date,category,amount,memo,account\n';const body=state.entries.map(e=>[e.type,e.date,e.cat,e.amount,e.memo,e.account].map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');download(new Blob([header+body],{type:'text/csv'}),'mei-kakeibo.csv')}
function restoreJSON(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();render();alert('復元しました。')}catch(e){alert('復元できませんでした。')}};r.readAsText(f)}
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
load();render();
</script>
</body></html>
