;border:1px solid var(--line);background:white;border-radius:16px;text-align:left;color:#087347;font-size:12px;font-weight:430}.cat.active{border:2px solid var(--g4);background:#edf9ef}.dot{display:inline-block;width:12px;height:12px;border-radius:50%;background:#8dcf99;margin-right:8px}.record{display:flex;align-items:center;gap:12px;border-bottom:1px solid #e5eee7;padding:12px 0}.record:last-child{border-bottom:0}.badge{width:34px;height:34px;border-radius:50%;background:#dff4e4;display:grid;place-items:center;color:var(--g6);font-size:0}.badge:before{content:"";width:16px;height:16px;border-radius:5px;background:var(--g4)}.grow{flex:1}.del{border:0;background:#eef6ef;color:var(--muted);border-radius:12px;padding:6px 8px;font-size:11.5px;font-weight:470}.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(480px,100%);height:calc(90px + env(safe-area-inset-bottom));padding:8px 10px calc(7px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid rgba(220,239,225,.70);display:grid;grid-template-columns:repeat(5,1fr);align-items:center;gap:2px;z-index:5;box-shadow:0 -8px 22px rgba(43,103,74,.055)}.nav button{appearance:none;-webkit-appearance:none;border:0;background:transparent;color:#74847d;width:100%;height:66px;border-radius:20px;font-weight:500;font-size:11px;letter-spacing:.01em;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;line-height:1;position:relative;-webkit-tap-highlight-color:transparent;transition:transform .16s ease,background .16s ease,color .16s ease}.nav button.active:not(.nav-add){background:#f0faef;color:#25aa6a;border:1.2px solid #d8efd9;box-shadow:inset 0 1px 0 rgba(255,255,255,.88)}.nav button:active{transform:scale(.97)}.nav-ico{width:24px;height:24px;display:grid;place-items:center;color:currentColor}.nav-ico svg{width:100%;height:100%;display:block;fill:none;stroke:currentColor;stroke-width:2.55;stroke-linecap:round;stroke-linejoin:round}.nav-label{display:block;font-size:11px;font-weight:500;line-height:1;color:currentColor;white-space:nowrap}.nav-add{color:#75877e;justify-content:flex-start;gap:5px;padding-top:0}.nav-add .nav-ico{width:50px;height:50px;margin-top:-15px;border-radius:50%;color:#fff;background:linear-gradient(180deg,#35b978 0%,#168c59 100%);box-shadow:0 14px 26px rgba(36,153,99,.22),0 0 0 10px rgba(84,199,136,.09),0 0 26px rgba(56,184,119,.31),inset 0 2px 4px rgba(255,255,255,.30),inset 0 -5px 10px rgba(12,97,59,.16)}.nav-add .nav-ico svg{width:30px;height:30px;stroke-width:3}.nav-add .nav-label{color:#74877d;font-size:11px;font-weight:500;margin-top:0}.nav button:not(.active):not(.nav-add) .nav-ico{opacity:.92}.nav button:not(.active):not(.nav-add) .nav-label{color:#7d8c86}.nav button.active:not(.nav-add) .nav-ico svg{stroke-width:2.65}

<body><div class="app">
<header class="hero"><div class="toprow"><div class="logo"><i></i></div><div><h1>めい家計簿</h1><div class="sub">貯金を守る、毎日の小さな作戦ノート</div></div></div><div class="monthpill"><button id="prevM">‹</button><span id="monthLabel">2026年6月</span><button id="nextM">›</button></div></header>
<main>

<section id="calendar" class="page"></section>
<section id="input" class="page"></section>
<section id="analysis" class="page"></section>
<section id="settings" class="page"></section>
</main>

<script>
const KEY='mei_kakeibo_single_v5';
const expenseCategoryGroups={
 'すべて':[],
 '食費':['朝食','昼ご飯','夕飯','夜食','買出し','お菓子'],
 '飲み物':['お茶とか','コーヒー','牛乳','お酒','コンビニ飲み物'],
 '衣類':['仕事用の洋服','洋服','上着下着','靴下','カバン','ヘアゴム、ヘアピン','靴'],
 '生活':['家用','マスク','色々','文房具','日用品','コンタクト'],
 '美容':['美容室','ヘアケア','スキンケア','コスメ','香水'],
 '交通':['電車','バス','タクシー','新幹線','飛行機'],
 '推し活':['チケット','グッズ','雑誌','遠征','代行','FC','配信','写真','うちわ材料'],
 '固定費':['家賃','水道光熱費','通信費','サブスク','保険'],
 '医療':['病院','薬','歯医者','検査'],
 'その他':['交際費','プレゼント','手数料','その他']
};
const expenseGroupNames=Object.keys(expenseCategoryGroups);
const outCats=[...new Set(expenseGroupNames.flatMap(g=>expenseCategoryGroups[g]).filter(Boolean))];
const inCats=['給料','ボーナス','バイト','業績賞与','賞金','臨時収入','返金','その他'];
let state={entries:[],accounts:[{name:'現金',currency:'TWD',balance:0},{name:'国泰世華銀行',currency:'TWD',balance:0},{name:'将来銀行',currency:'TWD',balance:0}],settings:{mealLimit:150,payday:10,goal:null,foodBudget:0,lifeBudget:0,liveName:'',liveDate:''},ym:new Date().toISOString().slice(0,7),inputType:'expense',selectedDate:new Date().toISOString().slice(0,10),selectedCatTab:'すべて',customCategories:{},categoryConfig:{},categoryEditMode:false,categoryEditing:null,pendingCatDelete:null};
function load(){try{const raw=localStorage.getItem(KEY); if(raw){state={...state,...JSON.parse(raw)}; state.settings={mealLimit:150,payday:10,goal:null,foodBudget:0,lifeBudget:0,liveName:'',liveDate:'',...state.settings}; state.customCategories={...(state.customCategories||{})}; state.categoryConfig={...(state.categoryConfig||{})}; state.categoryEditMode=!!state.categoryEditMode; state.categoryEditing=null; state.pendingCatDelete=null; state.selectedDate=state.selectedDate||today(); state.selectedCatTab=state.selectedCatTab||'すべて';}}catch(e){} normalizeCategoryConfig();}
function uniqueArr(arr){return [...new Set((arr||[]).map(x=>String(x||'').trim()).filter(Boolean))]}
function defaultCategoryConfig(){const cfg={};expenseGroupNames.filter(g=>g!=='すべて').forEach(g=>cfg[g]=[...(expenseCategoryGroups[g]||[])]);return cfg}
function normalizeCategoryConfig(){const hasCfg=state.categoryConfig&&Object.keys(state.categoryConfig).length; if(!hasCfg){state.categoryConfig=defaultCategoryConfig();Object.keys(state.customCategories||{}).forEach(g=>{if(g==='すべて')return;state.categoryConfig[g]=uniqueArr([...(state.categoryConfig[g]||[]),...(state.customCategories[g]||[])])});}expenseGroupNames.filter(g=>g!=='すべて').forEach(g=>{if(!Array.isArray(state.categoryConfig[g]))state.categoryConfig[g]=[...(expenseCategoryGroups[g]||[])];state.categoryConfig[g]=uniqueArr(state.categoryConfig[g]);});if(!Array.isArray(state.categoryConfig.income))state.categoryConfig.income=[...inCats];state.categoryConfig.income=uniqueArr(state.categoryConfig.income);}
function mergedExpenseGroups(){normalizeCategoryConfig();const merged={};expenseGroupNames.filter(g=>g!=='すべて').forEach(g=>merged[g]=[...(state.categoryConfig[g]||[])]);merged['すべて']=[...new Set(expenseGroupNames.filter(g=>g!=='すべて').flatMap(g=>merged[g]))];return merged}
function currentExpenseCats(){const groups=mergedExpenseGroups();return groups[state.selectedCatTab]||groups['すべて']||[]}
function currentIncomeCats(){normalizeCategoryConfig();return state.categoryConfig.income||[]}
function currentExpenseCatItems(){const groups=mergedExpenseGroups();if(state.selectedCatTab==='すべて'){const seen=new Set();return expenseGroupNames.filter(g=>g!=='すべて').flatMap(g=>(groups[g]||[]).map(name=>({group:g,name}))).filter(x=>{if(seen.has(x.name))return false;seen.add(x.name);return true;});}return (groups[state.selectedCatTab]||[]).map(name=>({group:state.selectedCatTab,name}));}
function currentIncomeCatItems(){return currentIncomeCats().map(name=>({group:'income',name}));}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function jsq(s){return JSON.stringify(String(s??''))}
function ensureSelectedDateInMonth(){if(!state.selectedDate)state.selectedDate=today();if(state.selectedDate.slice(0,7)!==state.ym){state.selectedDate=(today().slice(0,7)===state.ym)?today():state.ym+'-01';}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){alert('保存できませんでした。');}}
function yen(n){return 'NT$'+Math.round(Number(n)||0).toLocaleString('en-US')}
function today(){return new Date().toISOString().slice(0,10)}
function monthEntries(){return state.entries.filter(e=>e.date&&e.date.slice(0,7)===state.ym)}
function dayEntries(d){return state.entries.filter(e=>e.date===d)}
function sum(arr,type){return arr.filter(e=>!type||e.type===type).reduce((a,e)=>a+Number(e.amount||0),0)}
function switchPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===p));render();}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>switchPage(b.dataset.page));
document.getElementById('prevM').onclick=()=>{let d=new Date(state.ym+'-01');d.setMonth(d.getMonth()-1);state.ym=d.toISOString().slice(0,7);ensureSelectedDateInMonth();render();};
document.getElementById('nextM').onclick=()=>{let d=new Date(state.ym+'-01');d.setMonth(d.getMonth()+1);state.ym=d.toISOString().slice(0,7);ensureSelectedDateInMonth();render();};
function render(){document.getElementById('monthLabel').textContent=state.ym.replace('-','年')+'月';renderHome();renderInput();renderAnalysis();renderSettings();renderCalendar();}
function renderHome(){const m=monthEntries(), inc=sum(m,'income'), exp=sum(m,'expense'), bal=inc-exp; const foodToday=sum(dayEntries(today()).filter(e=>e.type==='expense'&&e.cat==='食費')); const lim=Number(state.settings.mealLimit)||150; const pct=Math.min(100,lim?foodToday/lim*100:0); const liveName=(state.settings.liveName||'').trim(); const liveDate=state.settings.liveDate||''; const daysToLive=liveDate?Math.ceil((new Date(liveDate+'T00:00:00')-new Date(today()+'T00:00:00'))/86400000):null; const goal=Number(state.settings.goal||0); const remainGoal=goal?Math.max(0,goal-bal):0; const rec=[...state.entries].sort((a,b)=>(b.date+b.id).localeCompare(a.date+a.id)).slice(0,4);
 document.getElementById('home').innerHTML=`<div class="grid3"><div class="card mini"><div class="label">今月の収入</div><div class="amount">${yen(inc)}</div></div><div class="card mini"><div class="label">今月の支出</div><div class="amount red">${yen(exp)}</div></div><div class="card mini"><div class="label">今月の収支</div><div class="amount ${bal<0?'red':''}">${yen(bal)}</div></div></div>
 <div class="card"><div class="section-title"><span>今日の食費チェック</span><span class="muted">${yen(foodToday)} / ${yen(lim)}</span></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="notice ${foodToday>lim?'danger':''}">${foodToday>lim?`警告：食費上限を${yen(foodToday-lim)}超過しています。今日はこれ以上の外食・お菓子・飲み物購入は禁止レベルです。明日以降で必ず補回収しましょう。`:`まだ${yen(lim-foodToday)}使えます。ここで止められたら、貯金体質にかなり近づきます。`}</div></div>
 <div class="card"><div class="section-title"><span>貯金目標</span><button class="btn ghost" onclick="switchPage('settings')">目標を設定する</button></div>${goal?`<div class="split"><div class="notice"><div class="muted">今月の目標</div><div class="amount">${yen(goal)}</div></div><div class="notice"><div class="muted">目標まであと</div><div class="amount">${yen(remainGoal)}</div></div></div><div class="notice" style="margin-top:12px">給料日前までの残り日数に合わせて、食費・生活費の目安を自動調整します。無理な月は目標を削除して翌月から再設定できます。</div>`:`<div class="notice">まだ目標は未設定です。月の途中なら、無理に設定しなくて大丈夫。次の給料日から本気モードにしましょう。</div>`}</div>
 <div class="card"><div class="section-title"><span>次の予定まであと</span>${liveDate?`<span class="muted">${liveDate}</span>`:''}</div><div class="notice">${liveDate?`${daysToLive<0?'<div>予定日を過ぎています</div>':`<div class="amount">あと ${daysToLive} 日</div>`}<div class="muted">${liveName||'ライブ名未設定'}</div>`:'ライブ予定はまだ未設定です。設定ページから登録できます。'}</div></div>
 <div class="card"><div class="section-title"><span>最近の記録</span><button class="btn ghost" onclick="switchPage('calendar')">すべて見る</button></div>${rec.length?rec.map(r=>recordHTML(r)).join(''):'<div class="notice">まだ記録がありません。「入力」から最初の記録をつけてみましょう。</div>'}</div>`;}
function recordHTML(r){return `<div class="record"><span class="badge"></span><div class="grow"><div>${r.cat}</div><div class="muted">${r.memo||'メモなし'}・${r.account||''}・${r.date}</div></div><div class="${r.type==='expense'?'redtext':'green'}">${r.type==='expense'?'-':'+'}${yen(r.amount)}</div><button class="del" onclick="delEntry('${r.id}')">削除</button></div>`}
function renderInput(){const isIncome=state.inputType==='income';const cats=isIncome?currentIncomeCats():currentExpenseCats();const catItems=isIncome?currentIncomeCatItems():currentExpenseCatItems();const tabHTML=isIncome?'':`<div class="category-tabs">${expenseGroupNames.map(g=>`<button type="button" class="cat-tab ${state.selectedCatTab===g?'active':''}" data-action="switch-category-tab" data-tab="${esc(g)}">${esc(g)}</button>`).join('')}</div>`;const catHTML=categoryPanelHTML(catItems);const addBoxHTML=isIncome?`<div class="cat-add-box"><div class="section-title" style="margin-bottom:10px"><span>カテゴリーを追加</span></div><label>カテゴリー名</label><div class="cat-add-row"><input id="newIncomeCatName" type="text" placeholder="例：副収入"><button type="button" class="btn ghost" data-action="add-income-category" onclick="addIncomeCategory(event)">追加する</button></div></div>`:`<div class="cat-add-box"><div class="section-title" style="margin-bottom:10px"><span>カテゴリーを追加</span></div><label>カテゴリー名</label><input id="newCatName" type="text" placeholder="例：カフェ"><label>追加先</label><div class="cat-add-row"><select id="newCatGroup">${expenseGroupNames.filter(g=>g!=='すべて').map(g=>`<option>${esc(g)}</option>`).join('')}</select><button type="button" class="btn ghost" data-action="add-expense-category" onclick="addCustomCategory(event)">追加する</button></div></div>`;document.getElementById('input').innerHTML=`<div class="card"><div class="form-tabs"><button type="button" class="${state.inputType==='expense'?'active':''}" onclick="state.inputType='expense';state.selectedCatTab=state.selectedCatTab||'すべて';state.categoryEditing=null;state.pendingCatDelete=null;renderInput()">支出</button><button type="button" class="${state.inputType==='income'?'active':''}" onclick="state.inputType='income';state.categoryEditing=null;state.pendingCatDelete=null;renderInput()">収入</button></div><label>金額</label><input id="amt" type="number" inputmode="numeric" placeholder="例：150"><label>カテゴリー</label>${tabHTML}${catHTML}${addBoxHTML}<div id="catNotice" class="notice cat-notice"></div><label>日付</label><input id="date" type="date" value="${today()}"><label>メモ</label><textarea id="memo" placeholder="空白でもOK"></textarea><label>アカウント</label><select id="acc">${state.accounts.map(a=>`<option>${esc(a.name)}</option>`).join('')}</select><button type="button" class="btn" style="width:100%;margin-top:18px" onclick="addEntry()">追加する</button><div id="cheer" class="notice" style="margin-top:12px;display:none"></div></div>`;}
function categoryPanelHTML(items){const edit=!!state.categoryEditMode;const head=`<div class="cat-edit-head"><span class="muted">${edit?'編集モード中':'通常モード'}</span><button type="button" class="btn ghost" data-action="toggle-category-edit" onclick="toggleCategoryEditMode(event)">${edit?'編集モードを閉じる':'カテゴリー編集'}</button></div>`;if(!edit)return head+`<div class="cat-panel">${items.map((x,i)=>`<button type="button" class="cat ${i===0?'active':''}" data-action="select-category" data-cat="${esc(x.name)}" onclick="selectCategoryButton(event,this)">${esc(x.name)}</button>`).join('')}</div>`;return head+`<div class="cat-edit-list">${items.map((x,i)=>categoryEditItemHTML(x,i)).join('')}</div>`;}
function categoryEditItemHTML(item,i){const isEditing=state.categoryEditing&&state.categoryEditing.group===item.group&&state.categoryEditing.name===item.name;const isPending=state.pendingCatDelete&&state.pendingCatDelete.group===item.group&&state.pendingCatDelete.name===item.name;if(isEditing){return `<div class="cat-edit-item"><div class="cat-edit-form"><input id="editCatName" type="text" value="${esc(item.name)}"><button type="button" class="cat-mini-btn" data-action="save-category" data-group="${esc(item.group)}" data-name="${esc(item.name)}" onclick="saveCategoryEdit(event,${jsq(item.group)},${jsq(item.name)})">保存</button><button type="button" class="cat-mini-btn" data-action="cancel-category" onclick="cancelCategoryEdit(event)">戻る</button></div></div>`;}return `<div class="cat-edit-item"><div class="cat-edit-line"><button type="button" class="cat ${i===0?'active':''}" data-action="select-category" data-cat="${esc(item.name)}" onclick="selectCategoryButton(event,this)">${esc(item.name)}</button><div class="cat-tools"><button type="button" class="cat-mini-btn" data-action="edit-category" data-group="${esc(item.group)}" data-name="${esc(item.name)}" onclick="startCategoryEdit(event,${jsq(item.group)},${jsq(item.name)})">編集</button><button type="button" class="cat-mini-btn danger" data-action="delete-category" data-group="${esc(item.group)}" data-name="${esc(item.name)}" onclick="askDeleteCategory(event,${jsq(item.group)},${jsq(item.name)})">削除</button></div></div>${isPending?`<div class="cat-confirm">このカテゴリーを削除しますか？<div class="cat-confirm-actions"><button type="button" class="cat-mini-btn danger" data-action="confirm-delete-category" data-group="${esc(item.group)}" data-name="${esc(item.name)}" onclick="deleteCategoryConfirmed(event,${jsq(item.group)},${jsq(item.name)})">削除する</button><button type="button" class="cat-mini-btn" data-action="cancel-delete-category" onclick="cancelDeleteCategory(event)">戻る</button></div></div>`:''}</div>`;}
function stopCatEvent(ev){if(ev&&ev.stopPropagation)ev.stopPropagation();}
function selectCategoryButton(ev,btn){stopCatEvent(ev);document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));if(btn)btn.classList.add('active');}
function toggleCategoryEditMode(ev){stopCatEvent(ev);state.categoryEditMode=!state.categoryEditMode;state.categoryEditing=null;state.pendingCatDelete=null;renderInput();}
function showCatNotice(msg,isError=false){const box=document.getElementById('catNotice');if(!box)return;box.textContent=msg;box.className='notice cat-notice show'+(isError?' danger':'')}
function catExists(name,exceptGroup=null,exceptName=null){const target=String(name||'').trim();return expenseGroupNames.filter(g=>g!=='すべて').some(g=>(state.categoryConfig[g]||[]).some(c=>c===target&&!(g===exceptGroup&&c===exceptName)))}
function incomeCatExists(name,exceptName=null){const target=String(name||'').trim();return (state.categoryConfig.income||[]).some(c=>c===target&&c!==exceptName)}
function categoryExistsInScope(group,name,oldName=null){return group==='income'?incomeCatExists(name,oldName):catExists(name,group,oldName)}
function syncCustomCategories(){state.customCategories=state.customCategories||{};expenseGroupNames.filter(g=>g!=='すべて').forEach(g=>{state.customCategories[g]=(state.categoryConfig[g]||[]).filter(c=>!(expenseCategoryGroups[g]||[]).includes(c));});}
function addCustomCategory(ev){stopCatEvent(ev);normalizeCategoryConfig();const name=(document.getElementById('newCatName')?.value||'').trim();const group=document.getElementById('newCatGroup')?.value;if(!name){showCatNotice('カテゴリー名を入力してください。',true);return;}if(catExists(name)){showCatNotice('このカテゴリーはすでに存在します。',true);return;}state.categoryConfig[group]=state.categoryConfig[group]||[];state.categoryConfig[group].push(name);syncCustomCategories();state.selectedCatTab=group;save();renderInput();setTimeout(()=>{const target=[...document.querySelectorAll('.cat')].find(x=>x.dataset.cat===name);if(target){document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));target.classList.add('active')}showCatNotice('追加しました。')},0)}
function addIncomeCategory(ev){stopCatEvent(ev);normalizeCategoryConfig();const name=(document.getElementById('newIncomeCatName')?.value||'').trim();if(!name){showCatNotice('カテゴリー名を入力してください。',true);return;}if(incomeCatExists(name)){showCatNotice('このカテゴリーはすでに存在します。',true);return;}state.categoryConfig.income=state.categoryConfig.income||[];state.categoryConfig.income.push(name);state.categoryConfig.income=uniqueArr(state.categoryConfig.income);save();renderInput();setTimeout(()=>{const target=[...document.querySelectorAll('.cat')].find(x=>x.dataset.cat===name);if(target){document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));target.classList.add('active')}showCatNotice('カテゴリーを追加しました。')},0)}
function startCategoryEdit(ev,group,name){stopCatEvent(ev);state.categoryEditing={group,name};state.pendingCatDelete=null;renderInput();setTimeout(()=>{const el=document.getElementById('editCatName');if(el){el.focus();el.select();}},0)}
function cancelCategoryEdit(ev){stopCatEvent(ev);state.categoryEditing=null;renderInput();}
function saveCategoryEdit(ev,group,oldName){stopCatEvent(ev);normalizeCategoryConfig();const input=document.getElementById('editCatName');const name=(input?.value||'').trim();if(!name){showCatNotice('カテゴリー名を入力してください。',true);return;}if(categoryExistsInScope(group,name,oldName)){showCatNotice('このカテゴリーはすでに存在します。',true);return;}const list=state.categoryConfig[group]||[];const idx=list.indexOf(oldName);if(idx<0){showCatNotice('カテゴリーが見つかりませんでした。',true);return;}list[idx]=name;state.categoryConfig[group]=uniqueArr(list);syncCustomCategories();state.categoryEditing=null;state.pendingCatDelete=null;save();renderInput();setTimeout(()=>{const target=[...document.querySelectorAll('.cat')].find(x=>x.dataset.cat===name);if(target){document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));target.classList.add('active')}showCatNotice('カテゴリーを更新しました。')},0)}
function askDeleteCategory(ev,group,name){stopCatEvent(ev);state.pendingCatDelete={group,name};state.categoryEditing=null;renderInput();}
function cancelDeleteCategory(ev){stopCatEvent(ev);state.pendingCatDelete=null;renderInput();}
function deleteCategoryConfirmed(ev,group,name){stopCatEvent(ev);normalizeCategoryConfig();state.categoryConfig[group]=(state.categoryConfig[group]||[]).filter(c=>c!==name);syncCustomCategories();state.pendingCatDelete=null;state.categoryEditing=null;save();renderInput();setTimeout(()=>showCatNotice('カテゴリーを削除しました。'),0)}
function addEntry(){const amount=Number(document.getElementById('amt').value);if(!amount||amount<0){alert('金額を入力してください。');return;}const cat=document.querySelector('.cat.active')?.dataset.cat;if(!cat){alert('カテゴリーを選択してください。');return;}const e={id:Date.now().toString(36),type:state.inputType,amount,cat,date:document.getElementById('date').value||today(),memo:document.getElementById('memo').value.trim(),account:document.getElementById('acc').value};state.entries.push(e);state.selectedDate=e.date;state.ym=e.date.slice(0,7);const acc=state.accounts.find(a=>a.name===e.account);if(acc){acc.balance=Number(acc.balance||0)+(e.type==='income'?amount:-amount);}save();document.getElementById('amt').value='';document.getElementById('memo').value='';const msgs=['えらい。記録できた時点で、もう半分勝ちです。','ここで見える化できる人は強いで。','今日の自分、ちゃんとお金を守ってます。','小さな記録が未来の安心になります。'];const box=document.getElementById('cheer');box.style.display='block';box.textContent=msgs[Math.floor(Math.random()*msgs.length)];render();switchPage('input');}
function delEntry(id){const e=state.entries.find(x=>x.id===id);if(!e)return;if(confirm('この記録を削除しますか？')){const acc=state.accounts.find(a=>a.name===e.account);if(acc){acc.balance=Number(acc.balance||0)-(e.type==='income'?e.amount:-e.amount);}state.entries=state.entries.filter(x=>x.id!==id);save();render();}}
function renderAnalysis(){const m=monthEntries(), exp=sum(m,'expense'), inc=sum(m,'income');let by={};m.filter(e=>e.type==='expense').forEach(e=>by[e.cat]=(by[e.cat]||0)+Number(e.amount));const analysisCats=[...new Set([...outCats,...Object.keys(by)])];const rows=analysisCats.map(c=>{const v=by[c]||0,p=exp?Math.round(v/exp*100):0;return `<div style="margin:12px 0"><div style="display:flex;justify-content:space-between"><span>${c}</span><span>${yen(v)}・${p}%</span></div><div class="progress"><div class="bar" style="width:${p}%"></div></div></div>`}).join('');document.getElementById('analysis').innerHTML=`<div class="card"><div class="section-title"><span>今月の分析</span><span class="muted">${state.ym}</span></div><div class="split"><div class="notice"><div class="muted">収入</div><div class="amount">${yen(inc)}</div></div><div class="notice"><div class="muted">支出</div><div class="amount red">${yen(exp)}</div></div></div></div><div class="card"><div class="section-title"><span>支出カテゴリー比率</span></div>${rows}</div>`}
function renderCalendar(){ensureSelectedDateInMonth();const [y,m]=state.ym.split('-').map(Number);const first=new Date(y,m-1,1);const last=new Date(y,m,0).getDate();let cells='';for(let i=0;i<first.getDay();i++)cells+='<div></div>';for(let d=1;d<=last;d++){const ds=`${state.ym}-${String(d).padStart(2,'0')}`;const arr=dayEntries(ds);const hasInc=arr.some(e=>e.type==='income');const hasExp=arr.some(e=>e.type==='expense');cells+=`<div class="day ${ds===today()?'today':''} ${ds===state.selectedDate?'selected':''}" onclick="state.selectedDate='${ds}';renderCalendar()"><b>${d}</b><div class="day-dots">${hasInc?'<span class="day-dot income"></span>':''}${hasExp?'<span class="day-dot expense"></span>':''}</div></div>`}const selectedList=[...dayEntries(state.selectedDate)].sort((a,b)=>(b.id||'').localeCompare(a.id||'')).map(recordHTML).join('');document.getElementById('calendar').innerHTML=`<div class="card"><div class="section-title"><span>カレンダー</span><span class="muted">記録がある日は点で表示</span></div><div class="calgrid"><b>日</b><b>月</b><b>火</b><b>水</b><b>木</b><b>金</b><b>土</b>${cells}</div></div><div class="card"><div class="section-title"><span>今日の記録</span><span class="muted">${state.selectedDate}</span></div>${selectedList||'<div class="notice">この日の記録はまだありません。</div>'}</div>`}
function renderSettings(){const net=state.accounts.reduce((a,x)=>a+Number(x.balance||0),0);document.getElementById('settings').innerHTML=`<div class="card"><div class="section-title"><span>アカウント</span><span class="muted">現金・銀行・カード別</span></div><div style="text-align:center;margin:4px 0 18px"><div class="amount">${yen(net)}</div><div class="muted">純資産</div></div>${state.accounts.map((a,i)=>`<div class="account-item"><span class="coin"></span><div class="grow"><div>${a.name}</div><div class="muted">${a.currency||'TWD'}</div></div><div class="amount" style="font-size:16.5px">${yen(a.balance)}</div><button class="del" onclick="editAccount(${i})">編集</button><button class="del" onclick="delAccount(${i})">削除</button></div>`).join('')}<div class="split" style="margin-top:14px"><input id="accName" placeholder="例：玉山銀行"><input id="accBal" type="number" placeholder="残高"></div><button class="btn" style="width:100%;margin-top:12px" onclick="addAccount()">アカウントを追加</button></div>
 <div class="card"><div class="section-title"><span>目標と上限</span><span class="muted">いつでも変更OK</span></div><div class="split"><div><label>1日の食費上限</label><input id="mealLimit" type="number" value="${state.settings.mealLimit}"></div><div><label>給料日</label><input id="payday" type="number" value="${state.settings.payday}"></div></div><label>月の貯金目標</label><input id="goal" type="number" placeholder="未設定" value="${state.settings.goal||''}"><div class="split"><div><label>月の食費予算</label><input id="foodBudget" type="number" value="${state.settings.foodBudget||''}"></div><div><label>月の生活費予算</label><input id="lifeBudget" type="number" value="${state.settings.lifeBudget||''}"></div></div><div class="pillrow" style="margin-top:16px"><button class="btn" onclick="saveSettings()">設定を保存</button><button class="btn danger" onclick="clearGoal()">目標を削除</button></div></div>
 <div class="card"><div class="section-title"><span>ライブ予定</span><span class="muted">ホームに表示</span></div><label>ライブ名</label><input id="liveName" type="text" placeholder="例：なにわ男子 横アリ" value="${state.settings.liveName||''}"><label>ライブ日</label><input id="liveDate" type="date" value="${state.settings.liveDate||''}"><div class="pillrow" style="margin-top:16px"><button class="btn" onclick="saveLiveSettings()">ライブ予定を保存</button><button class="btn ghost" onclick="clearLiveSettings()">未設定に戻す</button></div><div class="notice" style="margin-top:12px">保存すると、ホームのカウントダウンカードにライブ名と残り日数が表示されます。</div></div>
 <div class="card"><div class="section-title"><span>データ</span><span class="muted">バックアップ推奨</span></div><div class="data-actions"><button class="btn ghost" onclick="backup()">JSONバックアップ</button><button class="btn ghost" onclick="exportCSV()">CSV出力</button><button class="btn ghost" onclick="document.getElementById('restore').click()">JSON復元</button><input id="restore" type="file" accept="application/json" style="display:none" onchange="restoreJSON(this)"></div></div>`}
function addAccount(){const n=document.getElementById('accName').value.trim();const b=Number(document.getElementById('accBal').value||0);if(!n){alert('アカウント名を入力してください。');return;}state.accounts.push({name:n,currency:'TWD',balance:b});save();render();}
function editAccount(i){const a=state.accounts[i];const n=prompt('アカウント名',a.name);if(n===null)return;const b=prompt('残高',a.balance);if(b===null)return;a.name=n.trim()||a.name;a.balance=Number(b)||0;save();render();}
function delAccount(i){if(confirm('このアカウントを削除しますか？記録自体は残ります。')){state.accounts.splice(i,1);save();render();}}
function saveSettings(){state.settings.mealLimit=Number(document.getElementById('mealLimit').value)||150;state.settings.payday=Number(document.getElementById('payday').value)||10;state.settings.goal=Number(document.getElementById('goal').value)||null;state.settings.foodBudget=Number(document.getElementById('foodBudget').value)||0;state.settings.lifeBudget=Number(document.getElementById('lifeBudget').value)||0;const ln=document.getElementById('liveName');const ld=document.getElementById('liveDate');if(ln)state.settings.liveName=ln.value.trim();if(ld)state.settings.liveDate=ld.value;save();render();switchPage('home');}
function saveLiveSettings(){state.settings.liveName=document.getElementById('liveName').value.trim();state.settings.liveDate=document.getElementById('liveDate').value;save();render();switchPage('home');}
function clearLiveSettings(){state.settings.liveName='';state.settings.liveDate='';save();render();}
function clearGoal(){if(confirm('貯金目標を削除しますか？')){state.settings.goal=null;state.settings.foodBudget=0;state.settings.lifeBudget=0;save();render();}}
function backup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});download(blob,'mei-kakeibo-backup.json')}
function exportCSV(){const header='type,date,category,amount,memo,account\n';const body=state.entries.map(e=>[e.type,e.date,e.cat,e.amount,e.memo,e.account].map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');download(new Blob([header+body],{type:'text/csv'}),'mei-kakeibo.csv')}
function restoreJSON(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();render();alert('復元しました。')}catch(e){alert('復元できませんでした。')}};r.readAsText(f)}
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}

function handleInputCategoryClick(ev){const inputPage=document.getElementById('input');const btn=ev.target.closest('button[data-action]');if(!btn||!inputPage||!inputPage.contains(btn))return;const action=btn.dataset.action;const group=btn.dataset.group||'';const name=btn.dataset.name||'';if(['switch-category-tab','toggle-category-edit','select-category','edit-category','delete-category','save-category','cancel-category','confirm-delete-category','cancel-delete-category','add-expense-category','add-income-category'].includes(action)){ev.preventDefault();}
 if(action==='switch-category-tab'){ev.stopPropagation();state.selectedCatTab=btn.dataset.tab||'すべて';state.categoryEditing=null;state.pendingCatDelete=null;renderInput();return;}
 if(action==='toggle-category-edit')return toggleCategoryEditMode(ev);
