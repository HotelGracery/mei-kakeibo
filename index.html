<style>
:root{
  --deep:#28563a; --main:#3f7a52; --matcha:#86b783; --soft:#dcead5; --paper:#fbf7ed; --card:#fffdf7; --ink:#273528; --muted:#75816f;
  --danger:#a83232; --danger-bg:#fdecec; --warn:#b7791f; --line:#e6dfcf; --shadow:0 14px 34px rgba(40,86,58,.14);
  --radius:22px; --bottom:env(safe-area-inset-bottom); --top:env(safe-area-inset-top);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:linear-gradient(180deg,#eef7ea 0%,var(--paper) 28%,#f9f2df 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","YuGothic","Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;}
body{padding:calc(14px + var(--top)) 14px calc(24px + var(--bottom));}
.app{max-width:480px;margin:0 auto;}
.hero{background:linear-gradient(135deg,#2f6b46,#6da76b);color:white;border-radius:30px;padding:24px 20px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero:after{content:"";position:absolute;right:-36px;top:-50px;width:170px;height:170px;border-radius:50%;background:rgba(255,255,255,.16)}
h1{margin:0;font-size:28px;letter-spacing:.04em} .sub{margin:8px 0 0;opacity:.92;font-size:13px;line-height:1.6}
.card{background:rgba(255,253,247,.95);border:1px solid rgba(63,122,82,.12);border-radius:var(--radius);padding:16px;margin-top:14px;box-shadow:0 10px 26px rgba(60,92,51,.08)}
.section-title{display:flex;justify-content:space-between;align-items:center;margin:0 0 12px;font-size:17px;color:var(--deep);font-weight:800}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--soft);border-radius:18px;padding:13px 12px} .stat b{display:block;font-size:20px;margin-top:4px} .stat span{font-size:12px;color:var(--muted)}
label{display:block;font-weight:700;font-size:13px;color:var(--deep);margin:10px 0 6px}
input,select,textarea{width:100%;border:1px solid var(--line);background:#fffefa;border-radius:16px;padding:13px 12px;font:inherit;font-size:16px;outline:none;color:var(--ink)}
textarea{min-height:68px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--matcha);box-shadow:0 0 0 4px rgba(134,183,131,.22)}
.segment{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.segbtn{border:1px solid var(--line);background:#fffefa;color:var(--deep);border-radius:999px;padding:11px 10px;font-weight:800;cursor:pointer}
.segbtn.active{background:var(--deep);color:#fff;border-color:var(--deep)}
button.primary{width:100%;border:0;background:linear-gradient(135deg,var(--deep),var(--main));color:#fff;border-radius:18px;padding:14px;margin-top:14px;font-weight:900;font-size:16px;box-shadow:0 10px 22px rgba(47,107,70,.22);cursor:pointer}
button.ghost{border:1px solid var(--line);background:#fffefa;color:var(--deep);border-radius:14px;padding:10px 12px;font-weight:800;cursor:pointer}
.msg{margin-top:10px;background:#f2f8ee;border-left:5px solid var(--main);padding:11px 12px;border-radius:14px;font-size:13px;line-height:1.55;display:none}
.msg.show{display:block}
.progress-wrap{height:16px;background:#e5eadb;border-radius:999px;overflow:hidden;border:1px solid #d5ddcc}
.progress{height:100%;width:0%;background:linear-gradient(90deg,#8dbc7e,#3f7a52);transition:.25s} .progress.danger{background:linear-gradient(90deg,#d67854,#a83232)}
food-alert{display:block} .food-text{font-weight:800;margin-top:9px;color:var(--deep)} .food-text.danger{background:var(--danger-bg);color:var(--danger);border:1px solid #f1b5b5;border-radius:16px;padding:12px;animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.012)}}
.countdown{font-size:32px;font-weight:900;color:var(--deep);line-height:1} .countdown small{font-size:13px;color:var(--muted);font-weight:700}
.bar-row{margin:12px 0} .bar-head{display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-bottom:6px}
.bar-bg{height:12px;background:#edf0e5;border-radius:999px;overflow:hidden} .bar{height:100%;border-radius:999px;width:0%}
.record{display:grid;grid-template-columns:10px 1fr auto;gap:10px;align-items:center;padding:12px 0;border-bottom:1px dashed var(--line)}
.record:last-child{border-bottom:0} .dot{width:10px;height:10px;border-radius:50%} .r-main{min-width:0} .r-title{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .r-meta{font-size:12px;color:var(--muted);margin-top:3px} .amount{font-weight:900} .amount.income{color:#2f7c4b} .amount.expense{color:#954035} .del{border:0;background:#f4eee1;color:#6e5b40;border-radius:12px;padding:8px 9px;font-weight:800;cursor:pointer}
.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px} .tiny{font-size:12px;color:var(--muted);line-height:1.5}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:16px 0}
.category-pill{display:inline-flex;align-items:center;gap:7px;border-radius:999px;background:#f3f7ef;padding:6px 9px;font-size:12px;font-weight:800;color:var(--deep)}
@media(max-width:360px){h1{font-size:25px}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <h1>貯金ノート</h1>
    <p class="sub">日々の収入と支出を、手帳みたいにやさしく管理。食費だけは本気で守る、貯蓄上手さん仕様です。</p>
  </header>

  <section class="card">
    <div class="section-title">今日の食費チェック <span id="foodUsed">¥0 / ¥150</span></div>
    <div class="progress-wrap"><div id="foodProgress" class="progress"></div></div>
    <food-alert><div id="foodText" class="food-text"></div></food-alert>
  </section>

  <section class="card">
    <div class="section-title">コンサートまで</div>
    <div class="countdown"><span id="daysLeft">0</span>日 <small>2026年8月5日まで</small></div>
  </section>

  <section class="card">
    <div class="section-title">今月のまとめ</div>
    <div class="grid2">
      <div class="stat"><span>収入</span><b id="monthIncome">¥0</b></div>
      <div class="stat"><span>支出</span><b id="monthExpense">¥0</b></div>
      <div class="stat"><span>収支</span><b id="monthBalance">¥0</b></div>
      <div class="stat"><span>記録数</span><b id="monthCount">0件</b></div>
    </div>
  </section>

  <section class="card">
    <div class="section-title">記録する</div>
    <label>タイプ</label>
    <div class="segment"><button class="segbtn active" id="expenseBtn" type="button">支出</button><button class="segbtn" id="incomeBtn" type="button">収入</button></div>
    <label>金額</label><input id="amount" type="number" min="0" inputmode="numeric" placeholder="例：150">
    <label>カテゴリー</label><select id="category"></select>
    <label>メモ</label><textarea id="note" placeholder="例：ランチ、グッズ、給料など。空欄でもOK"></textarea>
    <label>日付</label><input id="date" type="date">
    <button class="primary" id="addBtn" type="button">この内容で記録する</button>
    <div id="message" class="msg"></div>
  </section>

  <section class="card">
    <div class="section-title">今月のカテゴリー別支出</div>
    <div id="categoryBars"></div>
  </section>

  <section class="card">
    <div class="section-title">最近の記録</div>
    <div id="records"></div>
    <div class="tools"><button class="ghost" id="exportBtn" type="button">JSONを書き出し</button><button class="ghost" id="clearBtn" type="button">全データ削除</button></div>
    <p class="tiny">データはこの端末のlocalStorageだけに保存されます。別のスマホやブラウザには自動同期されません。</p>
  </section>
</div>
<script>
(function(){
  'use strict';
  const KEY='mei_savings_notebook_v1';
  const FOOD_LIMIT=150;
  const expenseCats=[
    {name:'推し活', color:'#4d8b61'},{name:'食費', color:'#86b783'},{name:'生活費', color:'#6f9d6a'},{name:'交通', color:'#9dbb7b'},{name:'美容', color:'#b5c98d'},{name:'その他', color:'#7a9f85'}
  ];
  const incomeCats=[
    {name:'給料', color:'#2f7c4b'},{name:'ボーナス', color:'#579867'},{name:'副業・バイト', color:'#78ad73'},{name:'臨時収入', color:'#9dbc7a'},{name:'その他収入', color:'#6d9c76'}
  ];
  const cheers=['ちゃんと記録できてえらい。小さな管理が未来の安心になるで。','今日もお金の流れが見えた。貯金上手への一歩やね。','無理せず、でも甘やかしすぎず。いい感じに整えていこ。','記録した瞬間から勝ち。あとで自分を助けるメモになるよ。','ここで整えた分、推し活も生活ももっと楽しくなるで。'];
  let state=load();
  let currentType='expense';
  const $=id=>document.getElementById(id);
  function todayStr(){const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10);}
  function load(){try{const raw=localStorage.getItem(KEY); if(!raw) return {items:[],settings:{foodLimit:FOOD_LIMIT}}; const parsed=JSON.parse(raw); if(!parsed.items) parsed.items=[]; if(!parsed.settings) parsed.settings={foodLimit:FOOD_LIMIT}; return parsed;}catch(e){return {items:[],settings:{foodLimit:FOOD_LIMIT}};}}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){showMsg('保存できませんでした。端末の容量やブラウザ設定を確認してください。');}}
  function yen(n){return '¥'+Math.round(Number(n)||0).toLocaleString('ja-JP');}
  function ymd(d){return (d||'').replaceAll('-','/');}
  function thisMonthPrefix(){return todayStr().slice(0,7);}
  function updateCats(){const sel=$('category'); const cats=currentType==='expense'?expenseCats:incomeCats; sel.innerHTML=cats.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');}
  function setType(t){currentType=t; $('expenseBtn').classList.toggle('active',t==='expense'); $('incomeBtn').classList.toggle('active',t==='income'); updateCats();}
  function getColor(name){return [...expenseCats,...incomeCats].find(c=>c.name===name)?.color || '#7a9f85';}
  function render(){renderFood(); renderCountdown(); renderMonth(); renderBars(); renderRecords();}
  function renderFood(){const today=todayStr(); const used=state.items.filter(x=>x.type==='expense'&&x.category==='食費'&&x.date===today).reduce((s,x)=>s+Number(x.amount||0),0); const pct=Math.min(100, used/FOOD_LIMIT*100); $('foodUsed').textContent=`${yen(used)} / ${yen(FOOD_LIMIT)}`; const p=$('foodProgress'); p.style.width=pct+'%'; p.classList.toggle('danger',used>FOOD_LIMIT); const text=$('foodText'); if(used>FOOD_LIMIT){text.className='food-text danger'; text.textContent=`緊急警告：今日の食費が${yen(used-FOOD_LIMIT)}超過しています。ここから追加購入は禁止。明日以降で必ず調整してください。`;} else {text.className='food-text'; text.textContent=`あと${yen(FOOD_LIMIT-used)}使えます。今のペースなら大丈夫、落ち着いていこ。`;}}
  function renderCountdown(){const target=new Date('2026-08-05T00:00:00'); const now=new Date(); const diff=Math.ceil((target-now)/(1000*60*60*24)); $('daysLeft').textContent=Math.max(0,diff);}
  function renderMonth(){const m=thisMonthPrefix(); const month=state.items.filter(x=>(x.date||'').startsWith(m)); const inc=month.filter(x=>x.type==='income').reduce((s,x)=>s+Number(x.amount||0),0); const exp=month.filter(x=>x.type==='expense').reduce((s,x)=>s+Number(x.amount||0),0); $('monthIncome').textContent=yen(inc); $('monthExpense').textContent=yen(exp); $('monthBalance').textContent=yen(inc-exp); $('monthCount').textContent=month.length+'件';}
  function renderBars(){const m=thisMonthPrefix(); const exps=state.items.filter(x=>x.type==='expense'&&(x.date||'').startsWith(m)); const total=exps.reduce((s,x)=>s+Number(x.amount||0),0); const box=$('categoryBars'); if(!exps.length){box.innerHTML='<div class="empty">今月の支出記録はまだありません。</div>';return;} box.innerHTML=expenseCats.map(c=>{const sum=exps.filter(x=>x.category===c.name).reduce((s,x)=>s+Number(x.amount||0),0); const pct=total?sum/total*100:0; return `<div class="bar-row"><div class="bar-head"><span><span class="category-pill"><i class="dot" style="background:${c.color}"></i>${c.name}</span></span><span>${yen(sum)}・${pct.toFixed(1)}%</span></div><div class="bar-bg"><div class="bar" style="width:${pct}%;background:${c.color}"></div></div></div>`;}).join('');}
  function renderRecords(){const box=$('records'); const items=[...state.items].sort((a,b)=>(b.date+a.id).localeCompare(a.date+b.id)).slice(0,50); if(!items.length){box.innerHTML='<div class="empty">まだ記録がありません。最初の1件を入れてみましょう。</div>';return;} box.innerHTML=items.map(x=>`<div class="record"><span class="dot" style="background:${getColor(x.category)}"></span><div class="r-main"><div class="r-title">${x.category}${x.note?'｜'+escapeHtml(x.note):''}</div><div class="r-meta">${ymd(x.date)}・${x.type==='income'?'収入':'支出'}</div></div><div><div class="amount ${x.type}">${x.type==='income'?'+':'-'}${yen(x.amount)}</div><button class="del" data-id="${x.id}" type="button">削除</button></div></div>`).join('');}
  function escapeHtml(s){return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
  function showMsg(t){const m=$('message'); m.textContent=t; m.classList.add('show'); setTimeout(()=>m.classList.remove('show'),4200);}
  function addItem(){const amount=Number($('amount').value); if(!amount||amount<=0){showMsg('金額を入力してください。'); return;} const item={id:String(Date.now())+Math.random().toString(16).slice(2),type:currentType,amount,category:$('category').value,note:$('note').value.trim(),date:$('date').value||todayStr()}; state.items.push(item); save(); $('amount').value=''; $('note').value=''; $('date').value=todayStr(); showMsg(cheers[Math.floor(Math.random()*cheers.length)]); render();}
  $('expenseBtn').addEventListener('click',()=>setType('expense')); $('incomeBtn').addEventListener('click',()=>setType('income')); $('addBtn').addEventListener('click',addItem);
  $('records').addEventListener('click',e=>{if(e.target.classList.contains('del')){const id=e.target.dataset.id; state.items=state.items.filter(x=>x.id!==id); save(); render(); showMsg('削除しました。記録を整えるのも大事な節約です。');}});
  $('clearBtn').addEventListener('click',()=>{if(confirm('すべてのデータを削除します。よろしいですか？')){state={items:[],settings:{foodLimit:FOOD_LIMIT}}; save(); render(); showMsg('すべて削除しました。');}});
  $('exportBtn').addEventListener('click',()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='savings-notebook-backup.json'; a.click(); URL.revokeObjectURL(a.href);});
  $('date').value=todayStr(); setType('expense'); render();
})();
</script>
</body>
</html>
