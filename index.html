function load(){try{const raw=localStorage.getItem(KEY); if(raw){state={...state,...JSON.parse(raw)}; state.settings={mealLimit:150,payday:10,goal:null,foodBudget:0,lifeBudget:0,liveName:'',liveDate:'',...state.settings}; state.customCategories={...(state.customCategories||{})}; state.categoryConfig={...(state.categoryConfig||{})}; state.monthGoals={...(state.monthGoals||{})}; state.categoryEditMode=!!state.categoryEditMode; state.categoryEditing=null; state.pendingCatDelete=null; state.lastSaveNotice=null; state.selectedDate=state.selectedDate||today(); state.selectedCatTab=state.selectedCatTab||'すべて';}}catch(e){} state.monthGoals={...(state.monthGoals||{})}; state.categoryAddOpen=!!state.categoryAddOpen; if(!state.monthGoals[state.ym]&&(state.settings.goal||state.settings.foodBudget||state.settings.lifeBudget)){state.monthGoals[state.ym]={goal:Number(state.settings.goal)||0,foodBudget:Number(state.settings.foodBudget)||0,lifeBudget:Number(state.settings.lifeBudget)||0,oshiBudget:Number(state.settings.oshiBudget)||0,flexibleBudget:Number(state.settings.flexibleBudget)||0};} Object.keys(state.monthGoals||{}).forEach(k=>{state.monthGoals[k]={goal:0,foodBudget:0,lifeBudget:0,oshiBudget:0,flexibleBudget:0,...state.monthGoals[k]};}); normalizeCategoryConfig();normalizeAccounts();}
function uniqueArr(arr){return [...new Set((arr||[]).map(x=>String(x||'').trim()).filter(Boolean))]}
function defaultCategoryConfig(){const cfg={};expenseGroupNames.filter(g=>g!=='すべて').forEach(g=>cfg[g]=[...(expenseCategoryGroups[g]||[])]);return cfg}
function normalizeCategoryConfig(){const hasCfg=state.categoryConfig&&Object.keys(state.categoryConfig).length; if(!hasCfg){state.categoryConfig=defaultCategoryConfig();Object.keys(state.customCategories||{}).forEach(g=>{if(g==='すべて')return;state.categoryConfig[g]=uniqueArr([...(state.categoryConfig[g]||[]),...(state.customCategories[g]||[])])});}expenseGroupNames.filter(g=>g!=='すべて').forEach(g=>{if(!Array.isArray(state.categoryConfig[g]))state.categoryConfig[g]=[...(expenseCategoryGroups[g]||[])];state.categoryConfig[g]=uniqueArr(state.categoryConfig[g]);});if(!Array.isArray(state.categoryConfig.income))state.categoryConfig.income=[...inCats];state.categoryConfig.income=uniqueArr(state.categoryConfig.income);}
function mergedExpenseGroups(){normalizeCategoryConfig();const merged={};expenseGroupNames.filter(g=>g!=='すべて').forEach(g=>merged[g]=[...(state.categoryConfig[g]||[])]);merged['すべて']=[...new Set(expenseGroupNames.filter(g=>g!=='すべて').flatMap(g=>merged[g]))];return merged}
function currentExpenseCats(){const groups=mergedExpenseGroups();return groups[state.selectedCatTab]||groups['すべて']||[]}
function currentIncomeCats(){normalizeCategoryConfig();return state.categoryConfig.income||[]}
function currentExpenseCatItems(){const groups=mergedExpenseGroups();if(state.selectedCatTab==='すべて'){const seen=new Set();return expenseGroupNames.filter(g=>g!=='すべて').flatMap(g=>(groups[g]||[]).map(name=>({group:g,name}))).filter(x=>{if(seen.has(x.name))return false;seen.add(x.name);return true;});}return (groups[state.selectedCatTab]||[]).map(name=>({group:state.selectedCatTab,name}));}
function currentIncomeCatItems(){return currentIncomeCats().map(name=>({group:'income',name}));}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function jsq(s){return JSON.stringify(String(s??''))}
function ensureSelectedDateInMonth(){if(!state.selectedDate)state.selectedDate=today();if(state.selectedDate.slice(0,7)!==state.ym){state.selectedDate=(today().slice(0,7)===state.ym)?today():state.ym+'-01';}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){alert('保存できませんでした。');}}
function normalizeAccounts(){state.accounts=Array.isArray(state.accounts)?state.accounts:[];state.accounts=state.accounts.map(a=>({name:a?.name||'未設定',currency:a?.currency||'TWD',balance:Number(a?.balance)||0,includeInBudget:a?.includeInBudget!==false}));}
function budgetAccounts(){normalizeAccounts();return state.accounts.filter(a=>a.includeInBudget!==false);}
function budgetAccountBalance(){return budgetAccounts().reduce((a,x)=>a+Number(x.balance||0),0);}
function yen(n){return 'NT$'+Math.round(Number(n)||0).toLocaleString('en-US')}
function today(){return new Date().toISOString().slice(0,10)}
function monthEntries(){return state.entries.filter(e=>e.date&&e.date.slice(0,7)===state.ym)}
function dayEntries(d){return state.entries.filter(e=>e.date===d)}
function sum(arr,type){return arr.filter(e=>!type||e.type===type).reduce((a,e)=>a+Number(e.amount||0),0)}
function monthLabelText(){const [y,m]=state.ym.split('-');return `${y}年${Number(m)}月`}
function currentMonthGoal(){state.monthGoals=state.monthGoals||{};const g=state.monthGoals[state.ym]||{};return {goal:Number(g.goal)||0,foodBudget:Number(g.foodBudget)||0,lifeBudget:Number(g.lifeBudget)||0,oshiBudget:Number(g.oshiBudget)||0,flexibleBudget:Number(g.flexibleBudget)||0};}
function saveCurrentMonthGoal(goal,foodBudget,lifeBudget,oshiBudget,flexibleBudget){state.monthGoals=state.monthGoals||{};const next={goal:Number(goal)||0,foodBudget:Number(foodBudget)||0,lifeBudget:Number(lifeBudget)||0,oshiBudget:Number(oshiBudget)||0,flexibleBudget:Number(flexibleBudget)||0};if(next.goal||next.foodBudget||next.lifeBudget||next.oshiBudget||next.flexibleBudget){state.monthGoals[state.ym]=next;}else{delete state.monthGoals[state.ym];}}
function getGroupExpenseTotal(groupName){normalizeCategoryConfig();const list=state.categoryConfig?.[groupName]||[];const set=new Set(list);if(!set.size)return 0;return sum(monthEntries().filter(e=>e.type==='expense'&&set.has(e.cat)));}
function isFoodCategory(cat){normalizeCategoryConfig();const foodCats=new Set(state.categoryConfig?.['食費']||[]);return foodCats.has(cat)}
function getTodayFoodTotal(){normalizeCategoryConfig();return sum(dayEntries(today()).filter(e=>e.type==='expense'&&isFoodCategory(e.cat)));}
function getTodayExpenseTotal(){return sum(dayEntries(today()).filter(e=>e.type==='expense'));}
function isOshiCategory(cat){normalizeCategoryConfig();const oshiCats=new Set(state.categoryConfig?.['推し活']||[]);return oshiCats.has(cat);}
function getMonthOshiTotal(){normalizeCategoryConfig();return sum(monthEntries().filter(e=>e.type==='expense'&&isOshiCategory(e.cat)));}
function getTodayUsableAmount(paydayInfo){const todayExpense=getTodayExpenseTotal();const base=Number(paydayInfo?.daily)||0;return {todayExpense,amount:base-todayExpense,daily:base,days:Number(paydayInfo?.days)||0,available:Number(paydayInfo?.available)||0};}
function todayUsableHTML(info){const canUse=Math.floor(Number(info.amount)||0);const danger=canUse<=0;return `<div class="card"><div class="section-title"><span>今日あと使える金額</span><span class="muted">給料日まであと ${info.days} 日</span></div><div class="split"><div class="notice ${danger?'danger':''}"><div class="muted">今日あと使える金額</div><div class="amount ${danger?'red':''}">${yen(Math.max(0,canUse))}</div></div><div class="notice"><div class="muted">今日の支出合計</div><div class="amount red">${yen(info.todayExpense)}</div></div></div><div class="split" style="margin-top:12px"><div class="notice"><div class="muted">現在使える金額</div><div class="amount ${info.available<0?'red':''}">${yen(info.available)}</div></div><div class="notice"><div class="muted">1日あたり使える金額</div><div class="amount">${yen(Math.max(0,info.daily))}</div></div></div><div class="notice ${danger?'danger':''}" style="margin-top:12px">${danger?'今日はもう予算オーバーです。追加の外食・コンビニ・予定外の買い物は一度ストップしましょう。':`今日はあと ${yen(canUse)} まで使えます。小さな買い物もここを目安にしましょう。`}</div></div>`;}
function oshiBudgetStatusHTML(){const used=getMonthOshiTotal();const budget=currentMonthGoal().oshiBudget;if(!budget)return `<div class="card"><div class="section-title"><span>推し活予算チェック</span><span class="muted">未設定</span></div><div class="notice"><div class="muted">今月の推し活費</div><div class="amount">${yen(used)}</div></div><div class="notice" style="margin-top:12px">推し活予算はまだ未設定です。安心して楽しむために、今月使える上限を決めておくのがおすすめです。</div></div>`;const remain=budget-used;const rate=budget?used/budget*100:0;const width=Math.min(100,Math.max(0,rate));let msg='今月はまだ安心ラインです。推し活を楽しみながら、残り予算も確認できています。';let danger='';if(rate>=100){msg='推し活予算を超えています。今月は追加支出を一度ストップして、必要なものだけに絞りましょう。';danger='danger';}else if(rate>=90){msg='推し活費が危険ラインに近づいています。今月は追加のグッズ・代行・遠征費を慎重に確認しましょう。';danger='danger';}else if(rate>=70){msg='推し活費が予算の70%を超えています。追加購入やチケット費は一度確認してから決めましょう。';}return `<div class="card"><div class="section-title"><span>推し活予算チェック</span><span class="muted">${Math.round(rate)}%</span></div><div class="split"><div class="notice"><div class="muted">今月の推し活費</div><div class="amount">${yen(used)}</div></div><div class="notice"><div class="muted">今月の推し活予算</div><div class="amount">${yen(budget)}</div></div></div><div class="notice" style="margin-top:12px"><div class="muted">残り可用額</div><div class="amount ${remain<0?'red':''}">${yen(remain)}</div></div><div class="progress"><div class="bar" style="width:${width}%"></div></div><div class="notice ${danger}">${msg}</div></div>`;}

function isFlexibleCategory(cat){normalizeCategoryConfig();const groups=['推し活','衣類','美容','飲み物','その他'];const set=new Set(groups.flatMap(g=>state.categoryConfig?.[g]||[]));set.add('交際費');set.add('プレゼント');return set.has(cat);}
function getMonthFlexibleTotal(){return sum(monthEntries().filter(e=>e.type==='expense'&&isFlexibleCategory(e.cat)));}
function flexibleBudgetStatusHTML(){const used=getMonthFlexibleTotal();const budget=currentMonthGoal().flexibleBudget;if(!budget)return `<div class="card"><div class="section-title"><span>自由に使えるお金</span><span class="muted">未設定</span></div><div class="notice"><div class="muted">今月の自由支出</div><div class="amount">${yen(used)}</div></div><div class="notice" style="margin-top:12px">自由支出予算はまだ未設定です。推し活・美容・飲み物・予定外の買い物を安心して楽しむために、今月の上限を決めておくのがおすすめです。</div></div>`;const remain=budget-used;const rate=budget?used/budget*100:0;const width=Math.min(100,Math.max(0,rate));let msg='自由に使えるお金はまだ安心ラインです。このまま記録を続けましょう。';let danger='';if(rate>=100){msg='自由支出予算を超えています。今月は追加支出を一度ストップして、必要なものだけに絞りましょう。';danger='danger';}else if(rate>=90){msg='自由支出が危険ラインに近づいています。今月は予定外の買い物を慎重に確認しましょう。';danger='danger';}else if(rate>=70){msg='自由に使えるお金が少なくなってきています。追加購入やコンビニ支出は一度確認してから決めましょう。';}return `<div class="card"><div class="section-title"><span>自由に使えるお金</span><span class="muted">${Math.round(rate)}%</span></div><div class="split"><div class="notice"><div class="muted">今月の自由支出</div><div class="amount">${yen(used)}</div></div><div class="notice"><div class="muted">今月の自由支出予算</div><div class="amount">${yen(budget)}</div></div></div><div class="notice" style="margin-top:12px"><div class="muted">残り可用額</div><div class="amount ${remain<0?'red':''}">${yen(remain)}</div></div><div class="progress"><div class="bar" style="width:${width}%"></div></div><div class="notice ${danger}">${msg}</div></div>`;}
function getBuyAfterInfo(amount){const monthGoal=currentMonthGoal();const budgetBalance=budgetAccountBalance();const available=monthGoal.goal?budgetBalance-monthGoal.goal:budgetBalance;const paydayInfo=getNextPaydayInfo(available);const after=available-(Number(amount)||0);const daily=after/Math.max(1,Number(paydayInfo.days)||1);return {available,after,daily,days:paydayInfo.days};}
function buyCheckHTML(){const cats=mergedExpenseGroups()['すべて']||[];return `<div class="card"><div class="section-title"><span>買っても大丈夫チェック</span><span class="muted">試算だけ</span></div><div class="notice" style="margin-bottom:12px">買う前に、買った後の残り金額を確認できます。ここでチェックしても正式な支出には追加されません。</div><label>買いたい金額</label><input id="buyCheckAmount" type="number" inputmode="numeric" placeholder="例：3000"><label>カテゴリー</label><select id="buyCheckCategory">${cats.map(c=>`<option>${esc(c)}</option>`).join('')}</select><label>メモ（任意）</label><textarea id="buyCheckMemo" placeholder="例：今月中に必要か、来月でもいいか"></textarea><button type="button" class="btn" style="width:100%;margin-top:12px" onclick="renderBuyCheckResult()">チェックする</button><div id="buyCheckResult" class="buy-check-result"></div></div>`;}
function renderBuyCheckResult(){const box=document.getElementById('buyCheckResult');if(!box)return;const amount=Number(document.getElementById('buyCheckAmount')?.value||0);if(!amount||amount<=0){box.innerHTML='<div class="notice">買いたい金額を入力してください。</div>';return;}const info=getBuyAfterInfo(amount);let msg='買ってもまだ生活費には余裕があります。ただし小さな支出が重ならないように気をつけましょう。';let danger='';if(info.daily<=0){msg='これを買うと、給料日までの使える金額が足りなくなります。今月は見送るか、別の支出を減らしてからにしましょう。';danger='danger';}else if(info.daily<200){msg='これを買うと、給料日までかなりきつくなります。本当に今月必要か一度確認しましょう。';danger='danger';}else if(info.daily<500){msg='買うことはできますが、給料日まで少し節約が必要です。外食・コンビニ・予定外の買い物を控えめにしましょう。';}box.innerHTML=`<div class="split"><div class="notice"><div class="muted">買った後の使える金額</div><div class="amount ${info.after<0?'red':''}">${yen(info.after)}</div></div><div class="notice"><div class="muted">給料日まであと</div><div class="amount">${info.days} 日</div></div></div><div class="notice" style="margin-top:12px"><div class="muted">買った後の1日あたり使える金額</div><div class="amount ${info.daily<200?'red':''}">${yen(Math.max(0,info.daily))}</div></div><div class="notice ${danger}" style="margin-top:12px">${msg}</div>`;}
function getMonthEndPrediction(){const now=new Date();const viewingCurrentMonth=today().slice(0,7)===state.ym;const [y,m]=state.ym.split('-').map(Number);const day=viewingCurrentMonth?now.getDate():new Date(y,m,0).getDate();const daysInMonth=new Date(y,m,0).getDate();const exp=sum(monthEntries(),'expense');const predicted=day>0?exp/day*daysInMonth:exp;return {day,daysInMonth,exp,predicted,lifeBudget:currentMonthGoal().lifeBudget};}
function monthEndPredictionHTML(){const info=getMonthEndPrediction();let msg='今月はまだ始まったばかりなので、予測は参考程度に見てください。';let danger='';let pace='参考ペース';if(info.day>2){if(!info.lifeBudget){msg='生活費予算が未設定のため、まずは月末予測だけ表示しています。予算を入れると危険ラインも確認できます。';pace='予算未設定';}else if(info.predicted<=info.lifeBudget){msg='今のペースなら、月末まで大きく崩れにくい状態です。このまま記録を続けましょう。';pace='安心ペース';}else if(info.predicted<=info.lifeBudget*1.15){msg='今のペースだと、月末に予算を超える可能性があります。外食・コンビニ・予定外の買い物を少し控えめにしましょう。';pace='注意ペース';}else{msg='今のペースだと、月末にかなり予算オーバーする可能性があります。今週中に支出ペースを落としましょう。';danger='danger';pace='危険ペース';}}return `<div class="card"><div class="section-title"><span>月末ピンチ予測</span><span class="muted">${pace}</span></div><div class="split"><div class="notice"><div class="muted">今月目前支出</div><div class="amount red">${yen(info.exp)}</div></div><div class="notice"><div class="muted">月末予測支出</div><div class="amount ${info.lifeBudget&&info.predicted>info.lifeBudget?'red':''}">${yen(info.predicted)}</div></div></div><div class="notice" style="margin-top:12px"><div class="muted">現在ペース</div>${info.day}日目 / ${info.daysInMonth}日中</div><div class="notice ${danger}" style="margin-top:12px">${msg}</div></div>`;}

function adviceClass(text){return text&&text.includes('超えています')?'danger':''}
function budgetStatusHTML(label,used,budget){used=Number(used)||0;budget=Number(budget)||0;if(!budget)return `<div class="budget-item"><div class="notice"><div class="muted">${esc(label)}</div>予算はまだ未設定です。設定ページで今月の予算を入れると、使いすぎ防止の目安になります。</div></div>`;const rate=budget?used/budget*100:0;const width=Math.min(100,Math.max(0,rate));let msg='いいペースです。このまま守れたら安心です。';let danger='';if(rate>=100){msg='予算を超えています。今月は追加支出を止めて、来月の予算で調整しましょう。';danger='danger';}else if(rate>=90){msg='かなり危険ラインです。ここからは必要な支出だけに絞りましょう。';danger='danger';}else if(rate>=70){msg='そろそろ注意ラインです。今週の外食や買い足しを少し控えめにしましょう。';}return `<div class="budget-item"><div style="display:flex;justify-content:space-between;gap:10px"><span>${esc(label)}</span><span>${yen(used)} / ${yen(budget)}・${Math.round(rate)}%</span></div><div class="progress"><div class="bar" style="width:${width}%"></div></div><div class="notice ${danger}">${msg}</div></div>`}
function getNextPaydayInfo(available){const payday=Math.min(31,Math.max(1,Number(state.settings.payday)||10));const now=new Date();let next=new Date(now.getFullYear(),now.getMonth(),payday);if(now.getDate()>=payday)next=new Date(now.getFullYear(),now.getMonth()+1,payday);const days=Math.max(1,Math.ceil((new Date(next.getFullYear(),next.getMonth(),next.getDate())-new Date(now.getFullYear(),now.getMonth(),now.getDate()))/86400000));const daily=(Number(available)||0)/days;return {payday,days,available:Number(available)||0,daily};}
function paydayAdviceHTML(info){let msg='まだ余裕があります。今のペースを守りましょう。';let danger='';if(info.daily<0){msg='今月はすでに目標達成が難しい状態です。ここからは支出を止めて、必要最低限だけにしましょう。';danger='danger';}else if(info.daily<200){msg='かなり節約が必要です。コンビニ・外食・予定外の買い物は一度ストップしましょう。';danger='danger';}else if(info.daily<500){msg='少し節約モードに入りましょう。小さな支出を減らすだけでも効果があります。';}return `<div class="notice ${danger}">${msg}</div>`}
function savingAdviceHTML(balance,goal){if(!goal)return `<div class="notice">まだ目標は未設定です。月の途中なら、無理に設定しなくて大丈夫。次の給料日から本気モードにしましょう。</div>`;const diff=goal-balance;if(diff<=0)return `<div class="notice">今月の貯金目標を達成できています。このペースを守りましょう。</div>`;if(diff>goal*.5)return `<div class="notice danger">今月は少し注意が必要です。外食・コンビニ・推し活支出を一度見直しましょう。</div>`;return `<div class="notice">このペースだと貯金目標まであと ${yen(diff)} 必要です。</div>`}
function moneyAdviceHTML(inc,exp,balance,goal){if(exp>inc)return `<div class="notice danger">支出が収入を超えています。今月は追加支出を止めて、固定費以外を見直しましょう。</div>`;if(goal&&balance<goal)return `<div class="notice">黒字ですが、貯金目標まではまだ足りません。残り日数で使える金額を意識しましょう。</div>`;if(goal&&balance>=goal)return `<div class="notice">貯金目標ペースを達成しています。このままキープしましょう。</div>`;return `<div class="notice">今月の収支を見ながら、無理のない範囲で予算を整えていきましょう。</div>`}
function accountOptionsHTML(selected=''){normalizeAccounts();return state.accounts.map(a=>`<option value="${esc(a.name)}" ${a.name===selected?'selected':''}>${esc(a.name)}</option>`).join('')}
function switchPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===p));render();}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>switchPage(b.dataset.page));
document.getElementById('prevM').onclick=()=>{let d=new Date(state.ym+'-01');d.setMonth(d.getMonth()-1);state.ym=d.toISOString().slice(0,7);ensureSelectedDateInMonth();render();};

ategory-tab" data-tab="${esc(g)}">${esc(g)}</button>`).join('')}</div>`;const catHTML=categoryPanelHTML(catItems);const addInnerHTML=isIncome?`<div class="cat-add-box collapsible"><div class="section-title" style="margin-bottom:10px"><span>カテゴリーを追加</span></div><label>カテゴリー名</label><div class="cat-add-row"><input id="newIncomeCatName" type="text" placeholder="例：副収入"><button type="button" class="btn ghost" data-action="add-income-category" onclick="addIncomeCategory(event)">追加する</button></div></div>`:`<div class="cat-add-box collapsible"><div class="section-title" style="margin-bottom:10px"><span>カテゴリーを追加</span></div><label>カテゴリー名</label><input id="newCatName" type="text" placeholder="例：カフェ"><label>追加先</label><div class="cat-add-row"><select id="newCatGroup">${expenseGroupNames.filter(g=>g!=='すべて').map(g=>`<option>${esc(g)}</option>`).join('')}</select><button type="button" class="btn ghost" data-action="add-expense-category" onclick="addCustomCategory(event)">追加する</button></div></div>`;const addBoxHTML=`<button type="button" class="btn ghost cat-add-toggle" data-action="toggle-category-add">${state.categoryAddOpen?'− カテゴリーを閉じる':'＋ カテゴリーを追加'}</button>${state.categoryAddOpen?addInnerHTML:''}`;const saveNoticeHTML=state.lastSaveNotice?`<div id="saveNotice" class="notice ${state.lastSaveNotice.danger?'danger':''}" style="margin-top:12px">${esc(state.lastSaveNotice.message)}</div>`:'';document.getElementById('input').innerHTML=`<div class="card"><div class="form-tabs"><button type="button" class="${state.inputType==='expense'?'active':''}" onclick="state.inputType='expense';state.selectedCatTab=state.selectedCatTab||'すべて';state.categoryEditing=null;state.pendingCatDelete=null;state.categoryAddOpen=false;renderInput()">支出</button><button type="button" class="${state.inputType==='income'?'active':''}" onclick="state.inputType='income';state.categoryEditing=null;state.pendingCatDelete=null;state.categoryAddOpen=false;renderInput()">収入</button><button type="button" class="${state.inputType==='transfer'?'active':''}" onclick="state.inputType='transfer';state.categoryEditing=null;state.pendingCatDelete=null;state.categoryAddOpen=false;renderInput()">振替</button></div><label>金額</label><input id="amt" type="number" inputmode="numeric" placeholder="例：150"><label>カテゴリー</label>${tabHTML}${catHTML}${addBoxHTML}<div id="catNotice" class="notice cat-notice"></div><label>日付</label><input id="date" type="date" value="${today()}"><label>メモ</label><textarea id="memo" placeholder="空白でもOK"></textarea><label>アカウント</label><select id="acc">${accountOptionsHTML()}</select><button type="button" class="btn" style="width:100%;margin-top:18px" onclick="addEntry()">追加する</button>${saveNoticeHTML}<div id="cheer" class="notice" style="margin-top:12px;display:none"></div></div>${buyCheckHTML()}`;}
function categoryPanelHTML(items){const edit=!!state.categoryEditMode;const head=`<div class="cat-edit-head"><span class="muted">${edit?'編集モード中':'通常モード'}</span><button type="button" class="btn ghost" data-action="toggle-category-edit" onclick="toggleCategoryEditMode(event)">${edit?'編集モードを閉じる':'カテゴリー編集'}</button></div>`;if(!edit)return head+`<div class="cat-panel">${items.map((x,i)=>`<button type="button" class="cat ${i===0?'active':''}" data-action="select-category" data-cat="${esc(x.name)}" onclick="selectCategoryButton(event,this)">${esc(x.name)}</button>`).join('')}</div>`;return head+`<div class="cat-edit-list">${items.map((x,i)=>categoryEditItemHTML(x,i)).join('')}</div>`;}
function categoryEditItemHTML(item,i){const isEditing=state.categoryEditing&&state.categoryEditing.group===item.group&&state.categoryEditing.name===item.name;const isPending=state.pendingCatDelete&&state.pendingCatDelete.group===item.group&&state.pendingCatDelete.name===item.name;if(isEditing){return `<div class="cat-edit-item"><div class="cat-edit-form"><input id="editCatName" type="text" value="${esc(item.name)}"><button type="button" class="cat-mini-btn" data-action="save-category" data-group="${esc(item.group)}" data-name="${esc(item.name)}" onclick="saveCategoryEdit(event,${jsq(item.group)},${jsq(item.name)})">保存</button><button type="button" class="cat-mini-btn" data-action="cancel-category" onclick="cancelCategoryEdit(event)">戻る</button></div></div>`;}return `<div class="cat-edit-item"><div class="cat-edit-line"><button type="button" class="cat ${i===0?'active':''}" data-action="select-category" data-cat="${esc(item.name)}" onclick="selectCategoryButton(event,this)">${esc(item.name)}</button><div class="cat-tools"><button type="button" class="cat-mini-btn" data-action="edit-category" data-group="${esc(item.group)}" data-name="${esc(item.name)}" onclick="startCategoryEdit(event,${jsq(item.group)},${jsq(item.name)})">編集</button><button type="button" class="cat-mini-btn danger" data-action="delete-category" data-group="${esc(item.group)}" data-name="${esc(item.name)}" onclick="askDeleteCategory(event,${jsq(item.group)},${jsq(item.name)})">削除</button></div></div>${isPending?`<div class="cat-confirm">このカテゴリーを削除しますか？<div class="cat-confirm-actions"><button type="button" class="cat-mini-btn danger" data-action="confirm-delete-category" data-group="${esc(item.group)}" data-name="${esc(item.name)}" onclick="deleteCategoryConfirmed(event,${jsq(item.group)},${jsq(item.name)})">削除する</button><button type="button" class="cat-mini-btn" data-action="cancel-delete-category" onclick="cancelDeleteCategory(event)">戻る</button></div></div>`:''}</div>`;}
function stopCatEvent(ev){if(ev&&ev.stopPropagation)ev.stopPropagation();}
function selectCategoryButton(ev,btn){stopCatEvent(ev);document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));if(btn)btn.classList.add('active');}
function toggleCategoryEditMode(ev){stopCatEvent(ev);state.categoryEditMode=!state.categoryEditMode;state.categoryEditing=null;state.pendingCatDelete=null;renderInput();}
function showCatNotice(msg,isError=false){const box=document.getElementById('catNotice');if(!box)return;box.textContent=msg;box.className='notice cat-notice show'+(isError?' danger':'')}
function catExists(name,exceptGroup=null,exceptName=null){const target=String(name||'').trim();return expenseGroupNames.filter(g=>g!=='すべて').some(g=>(state.categoryConfig[g]||[]).some(c=>c===target&&!(g===exceptGroup&&c===exceptName)))}
function incomeCatExists(name,exceptName=null){const target=String(name||'').trim();return (state.categoryConfig.income||[]).some(c=>c===target&&c!==exceptName)}
function categoryExistsInScope(group,name,oldName=null){return group==='income'?incomeCatExists(name,oldName):catExists(name,group,oldName)}
function syncCustomCategories(){state.customCategories=state.customCategories||{};expenseGroupNames.filter(g=>g!=='すべて').forEach(g=>{state.customCategories[g]=(state.categoryConfig[g]||[]).filter(c=>!(expenseCategoryGroups[g]||[]).includes(c));});}
function addCustomCategory(ev){stopCatEvent(ev);normalizeCategoryConfig();const name=(document.getElementById('newCatName')?.value||'').trim();const group=document.getElementById('newCatGroup')?.value;if(!name){showCatNotice('カテゴリー名を入力してください。',true);return;}if(catExists(name)){showCatNotice('このカテゴリーはすでに存在します。',true);return;}state.categoryConfig[group]=state.categoryConfig[group]||[];state.categoryConfig[group].push(name);syncCustomCategories();state.selectedCatTab=group;state.categoryAddOpen=false;save();renderInput();setTimeout(()=>{const target=[...document.querySelectorAll('.cat')].find(x=>x.dataset.cat===name);if(target){document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));target.classList.add('active')}showCatNotice('追加しました。')},0)}
function addIncomeCategory(ev){stopCatEvent(ev);normalizeCategoryConfig();const name=(document.getElementById('newIncomeCatName')?.value||'').trim();if(!name){showCatNotice('カテゴリー名を入力してください。',true);return;}if(incomeCatExists(name)){showCatNotice('このカテゴリーはすでに存在します。',true);return;}state.categoryConfig.income=state.categoryConfig.income||[];state.categoryConfig.income.push(name);state.categoryConfig.income=uniqueArr(state.categoryConfig.income);state.categoryAddOpen=false;save();renderInput();setTimeout(()=>{const target=[...document.querySelectorAll('.cat')].find(x=>x.dataset.cat===name);if(target){document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));target.classList.add('active')}showCatNotice('カテゴリーを追加しました。')},0)}
function startCategoryEdit(ev,group,name){stopCatEvent(ev);state.categoryEditing={group,name};state.pendingCatDelete=null;renderInput();setTimeout(()=>{const el=document.getElementById('editCatName');if(el){el.focus();el.select();}},0)}
function cancelCategoryEdit(ev){stopCatEvent(ev);state.categoryEditing=null;renderInput();}
function saveCategoryEdit(ev,group,oldName){stopCatEvent(ev);normalizeCategoryConfig();const input=document.getElementById('editCatName');const name=(input?.value||'').trim();if(!name){showCatNotice('カテゴリー名を入力してください。',true);return;}if(categoryExistsInScope(group,name,oldName)){showCatNotice('このカテゴリーはすでに存在します。',true);return;}const list=state.categoryConfig[group]||[];const idx=list.indexOf(oldName);if(idx<0){showCatNotice('カテゴリーが見つかりませんでした。',true);return;}list[idx]=name;state.categoryConfig[group]=uniqueArr(list);syncCustomCategories();state.categoryEditing=null;state.pendingCatDelete=null;save();renderInput();setTimeout(()=>{const target=[...document.querySelectorAll('.cat')].find(x=>x.dataset.cat===name);if(target){document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));target.classList.add('active')}showCatNotice('カテゴリーを更新しました。')},0)}
function askDeleteCategory(ev,group,name){stopCatEvent(ev);state.pendingCatDelete={group,name};state.categoryEditing=null;renderInput();}
function cancelDeleteCategory(ev){stopCatEvent(ev);state.pendingCatDelete=null;renderInput();}
function deleteCategoryConfirmed(ev,group,name){stopCatEvent(ev);normalizeCategoryConfig();state.categoryConfig[group]=(state.categoryConfig[group]||[]).filter(c=>c!==name);syncCustomCategories();state.pendingCatDelete=null;state.categoryEditing=null;save();renderInput();setTimeout(()=>showCatNotice('カテゴリーを削除しました。'),0)}
function showTransferNotice(message,danger=false){state.lastSaveNotice={message,danger};renderInput();}
function addTransfer(){const amount=Number(document.getElementById('transferAmt')?.value||0);const fromAccount=document.getElementById('transferFrom')?.value||'';const toAccount=document.getElementById('transferTo')?.value||'';const date=document.getElementById('transferDate')?.value||today();const memo=(document.getElementById('transferMemo')?.value||'').trim();if(!amount){showTransferNotice('金額を入力してください。',true);return;}if(amount<=0){showTransferNotice('金額は1円以上で入力してください。',true);return;}if(!fromAccount||!toAccount){showTransferNotice('振替元と振替先を選択してください。',true);return;}if(fromAccount===toAccount){showTransferNotice('振替元と振替先は別のアカウントを選択してください。',true);return;}const from=state.accounts.find(a=>a.name===fromAccount);const to=state.accounts.find(a=>a.name===toAccount);if(!from||!to){showTransferNotice('アカウントが見つかりませんでした。設定を確認してください。',true);return;}const e={id:Date.now().toString(36),type:'transfer',amount,fromAccount,toAccount,date,memo};state.entries.push(e);from.balance=Number(from.balance||0)-amount;to.balance=Number(to.balance||0)+amount;state.selectedDate=date;state.ym=date.slice(0,7);state.lastSaveNotice={message:'振替を保存しました。',danger:false};save();render();setTimeout(()=>{const amt=document.getElementById('transferAmt');const memoEl=document.getElementById('transferMemo');if(amt)amt.value='';if(memoEl)memoEl.value='';},0);}
function addEntry(){const amount=Number(document.getElementById('amt').value);if(!amount||amount<0){alert('金額を入力してください。');return;}const cat=document.querySelector('.cat.active')?.dataset.cat;if(!cat){alert('カテゴリーを選択してください。');return;}const e={id:Date.now().toString(36),type:state.inputType,amount,cat,date:document.getElementById('date').value||today(),memo:document.getElementById('memo').value.trim(),account:document.getElementById('acc').value};state.entries.push(e);state.selectedDate=e.date;state.ym=e.date.slice(0,7);const acc=state.accounts.find(a=>a.name===e.account);if(acc){acc.balance=Number(acc.balance||0)+(e.type==='income'?amount:-amount);}const mealLimit=Number(state.settings.mealLimit)||150;const foodOver=e.type==='expense'&&isFoodCategory(e.cat)&&e.date===today()&&getTodayFoodTotal()>mealLimit;state.lastSaveNotice={message:foodOver?'記録を保存しました。今日の食費上限を超えています。':'記録を保存しました。',danger:foodOver};save();render();switchPage('input');setTimeout(()=>{const amt=document.getElementById('amt');const memo=document.getElementById('memo');if(amt)amt.value='';if(memo)memo.value='';const msgs=['えらい。記録できた時点で、もう半分勝ちです。','ここで見える化できる人は強いで。','今日の自分、ちゃんとお金を守ってます。','小さな記録が未来の安心になります。'];const box=document.getElementById('cheer');if(box){box.style.display='block';box.textContent=msgs[Math.floor(Math.random()*msgs.length)];}},0);}
function delEntry(id){const e=state.entries.find(x=>x.id===id);if(!e)return;if(confirm('この記録を削除しますか？')){if(e.type==='transfer'){const from=state.accounts.find(a=>a.name===e.fromAccount);const to=state.accounts.find(a=>a.name===e.toAccount);if(from)from.balance=Number(from.balance||0)+Number(e.amount||0);if(to)to.balance=Number(to.balance||0)-Number(e.amount||0);}else{const acc=state.accounts.find(a=>a.name===e.account);if(acc){acc.balance=Number(acc.balance||0)-(e.type==='income'?Number(e.amount||0):-Number(e.amount||0));}}state.entries=state.entries.filter(x=>x.id!==id);state.lastSaveNotice={message:'記録を削除しました。',danger:false};save();render();}}
function validExpenseCategorySet(){
 const groups=mergedExpenseGroups();
 return new Set(expenseGroupNames.filter(g=>g!=='すべて').flatMap(g=>groups[g]||[]));
}
function validIncomeCategorySet(){
 return new Set(currentIncomeCats());
}
function categoryRatioRows(type,total,validSet,emptyText){
 const by={};
 monthEntries().filter(e=>e.type===type&&validSet.has(e.cat)).forEach(e=>{by[e.cat]=(by[e.cat]||0)+Number(e.amount||0)});
 const rows=Object.entries(by).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
 if(!rows.length)return `<div class="notice">${emptyText}</div>`;
 return rows.map(([c,v])=>{const p=total?Math.round(v/total*100):0;return `<div style="margin:12px 0"><div style="display:flex;justify-content:space-between;gap:10px"><span>${esc(c)}</span><span>${yen(v)}・${p}%</span></div><div class="progress"><div class="bar" style="width:${p}%"></div></div></div>`}).join('');
}
function renderAnalysis(){
 normalizeCategoryConfig();
 const m=monthEntries();
 const validExp=validExpenseCategorySet();
 const validInc=validIncomeCategorySet();
 const exp=sum(m,'expense');
 const inc=sum(m,'income');
 const visibleExp=sum(m.filter(e=>e.type==='expense'&&validExp.has(e.cat)));
 const visibleInc=sum(m.filter(e=>e.type==='income'&&validInc.has(e.cat)));
 const expenseRows=categoryRatioRows('expense',visibleExp,validExp,'今月の支出記録はまだありません');
 const incomeRows=categoryRatioRows('income',visibleInc,validInc,'今月の収入記録はまだありません');
 const goal=currentMonthGoal().goal; const bal=inc-exp;
 document.getElementById('analysis').innerHTML=`<div class="card"><div class="section-title"><span>今月の分析</span><span class="muted">${state.ym}</span></div><div class="split"><div class="notice"><div class="muted">収入</div><div class="amount">${yen(inc)}</div></div><div class="notice"><div class="muted">支出</div><div class="amount red">${yen(exp)}</div></div></div><div style="margin-top:12px">${moneyAdviceHTML(inc,exp,bal,goal)}</div></div><div class="card"><div class="section-title"><span>支出カテゴリー比率</span></div>${expenseRows}</div><div class="card"><div class="section-title"><span>収入カテゴリー比率</span></div>${incomeRows}</div>`;
}
function renderCalendar(){ensureSelectedDateInMonth();const [y,m]=state.ym.split('-').map(Number);const first=new Date(y,m-1,1);const last=new Date(y,m,0).getDate();let cells='';for(let i=0;i<first.getDay();i++)cells+='<div></div>';for(let d=1;d<=last;d++){const ds=`${state.ym}-${String(d).padStart(2,'0')}`;const arr=dayEntries(ds);const hasInc=arr.some(e=>e.type==='income');const hasExp=arr.some(e=>e.type==='expense');const hasTransfer=arr.some(e=>e.type==='transfer');cells+=`<div class="day ${ds===today()?'today':''} ${ds===state.selectedDate?'selected':''}" onclick="state.selectedDate='${ds}';renderCalendar()"><b>${d}</b><div class="day-dots">${hasInc?'<span class="day-dot income"></span>':''}${hasExp?'<span class="day-dot expense"></span>':''}${hasTransfer?'<span class="day-dot transfer"></span>':''}</div></div>`}const selectedList=[...dayEntries(state.selectedDate)].sort((a,b)=>(b.id||'').localeCompare(a.id||'')).map(recordHTML).join('');document.getElementById('calendar').innerHTML=`<div class="card"><div class="section-title"><span>カレンダー</span><span class="muted">記録がある日は点で表示</span></div><div class="calgrid"><b>日</b><b>月</b><b>火</b><b>水</b><b>木</b><b>金</b><b>土</b>${cells}</div></div><div class="card"><div class="section-title"><span>今日の記録</span><span class="muted">${state.selectedDate}</span></div>${selectedList||'<div class="notice">この日の記録はまだありません。</div>'}</div>`}
function accountIconHTML(name){
 const n=String(name||'');
 if(n==='現金'||n.includes('現金')||/cash/i.test(n))return `<span class="account-icon cash" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M6.5 7.5h11c1.2 0 2 .8 2 2v7c0 1.2-.8 2-2 2h-11c-1.2 0-2-.8-2-2v-7c0-1.2.8-2 2-2Z"/><path d="M7.2 7.4V6.8c0-1 .7-1.7 1.7-1.7h7.2"/><path d="M15.8 13h3.7"/><circle cx="14.8" cy="13" r="1"/></svg></span>`;
 if(n.includes('銀行')||/bank/i.test(n))return `<span class="account-icon bank" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4.5 10h15"/><path d="M6 10v7M10 10v7M14 10v7M18 10v7"/><path d="M4.5 18.5h15"/><path d="M12 4.8 4.8 8.5h14.4Z"/></svg></span>`;
 return `<span class="account-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="5" y="6.5" width="14" height="11" rx="2.3"/><path d="M7.5 10h5.8"/><path d="M7.5 13.3h8.8"/></svg></span>`;
}
function renderSettings(){const net=state.accounts.reduce((a,x)=>a+Number(x.balance||0),0);document.getElementById('settings').innerHTML=`<div class="card"><div class="section-title"><span>アカウント</span><span class="muted">現金・銀行・カード別</span></div><div style="text-align:center;margin:4px 0 18px"><div class="amount">${yen(net)}</div><div class="muted">純資産</div></div>${state.accounts.map((a,i)=>`<div class="account-item">${accountIconHTML(a.name)}<div class="grow"><div>${esc(a.name)}</div><div class="muted">${esc(a.currency||'TWD')}</div><div class="account-budget-line"><span class="budget-badge ${a.includeInBudget===false?'off':''}">${a.includeInBudget===false?'予算対象外':'予算対象'}</span><button type="button" class="budget-toggle ${a.includeInBudget===false?'off':''}" onclick="toggleAccountBudgetTarget(${i})">${a.includeInBudget===false?'予算ON':'予算OFF'}</button></div></div><div class="amount" style="font-size:16.5px">${yen(a.balance)}</div><button class="del" onclick="editAccount(${i})">編集</button><button class="del" onclick="delAccount(${i})">削除</button></div>`).join('')}<div class="split" style="margin-top:14px"><input id="accName" placeholder="例：玉山銀行"><input id="accBal" type="number" placeholder="残高"></div><button class="btn" style="width:100%;margin-top:12px" onclick="addAccount()">アカウントを追加</button></div>
 <div class="card"><div class="section-title"><span>月別目標と予算</span><span class="muted">${monthLabelText()}の目標</span></div><div class="notice" style="margin-bottom:12px">${monthLabelText()}だけに保存されます。別の月に切り替えると、その月専用の目標と予算を設定できます。</div><label>月の貯金目標</label><input id="goal" type="number" placeholder="未設定" value="${currentMonthGoal().goal||''}"><div class="split"><div><label>月の食費予算</label><input id="foodBudget" type="number" value="${currentMonthGoal().foodBudget||''}"></div><div><label>月の生活費予算</label><input id="lifeBudget" type="number" value="${currentMonthGoal().lifeBudget||''}"></div></div><label>今月の推し活予算</label><input id="oshiBudget" type="number" placeholder="未設定" value="${currentMonthGoal().oshiBudget||''}"><label>今月の自由支出予算</label><input id="flexibleBudget" type="number" placeholder="未設定" value="${currentMonthGoal().flexibleBudget||''}"><div class="split"><div><label>1日の食費上限</label><input id="mealLimit" type="number" value="${state.settings.mealLimit}"></div><div><label>給料日</label><input id="payday" type="number" value="${state.settings.payday}"></div></div><div class="pillrow" style="margin-top:16px"><button class="btn" onclick="saveSettings()">設定を保存</button><button class="btn danger" onclick="clearGoal()">目標を削除</button></div></div>
 <div class="card"><div class="section-title"><span>ライブ予定</span><span class="muted">ホームに表示</span></div><label>ライブ名</label><input id="liveName" type="text" placeholder="例：なにわ男子 横アリ" value="${state.settings.liveName||''}"><label>ライブ日</label><input id="liveDate" type="date" value="${state.settings.liveDate||''}"><div class="pillrow" style="margin-top:16px"><button class="btn" onclick="saveLiveSettings()">ライブ予定を保存</button><button class="btn ghost" onclick="clearLiveSettings()">未設定に戻す</button></div><div class="notice" style="margin-top:12px">保存すると、ホームのカウントダウンカードにライブ名と残り日数が表示されます。</div></div>
 <div class="card"><div class="section-title"><span>データ</span><span class="muted">バックアップ推奨</span></div><div class="data-actions"><button class="btn ghost" onclick="backup()">JSONバックアップ</button><button class="btn ghost" onclick="exportCSV()">CSV出力</button><button class="btn ghost" onclick="document.getElementById('restore').click()">JSON復元</button><input id="restore" type="file" accept="application/json" style="display:none" onchange="restoreJSON(this)"></div></div>`}
function addAccount(){const n=document.getElementById('accName').value.trim();const b=Number(document.getElementById('accBal').value||0);if(!n){alert('アカウント名を入力してください。');return;}state.accounts.push({name:n,currency:'TWD',balance:b,includeInBudget:true});save();render();}
function editAccount(i){const a=state.accounts[i];const n=prompt('アカウント名',a.name);if(n===null)return;const b=prompt('残高',a.balance);if(b===null)return;a.name=n.trim()||a.name;a.balance=Number(b)||0;save();render();}
function delAccount(i){if(confirm('このアカウントを削除しますか？記録自体は残ります。')){state.accounts.splice(i,1);save();render();}}
function toggleAccountBudgetTarget(i){normalizeAccounts();if(!state.accounts[i])return;state.accounts[i].includeInBudget=state.accounts[i].includeInBudget===false;save();render();}
function saveSettings(){state.settings.mealLimit=Number(document.getElementById('mealLimit').value)||150;state.settings.payday=Number(document.getElementById('payday').value)||10;const goal=Number(document.getElementById('goal').value)||0;const foodBudget=Number(document.getElementById('foodBudget').value)||0;const lifeBudget=Number(document.getElementById('lifeBudget').value)||0;const oshiBudget=Number(document.getElementById('oshiBudget')?.value)||0;const flexibleBudget=Number(document.getElementById('flexibleBudget')?.value)||0;saveCurrentMonthGoal(goal,foodBudget,lifeBudget,oshiBudget,flexibleBudget);if(goal)state.settings.goal=goal;if(foodBudget)state.settings.foodBudget=foodBudget;if(lifeBudget)state.settings.lifeBudget=lifeBudget;if(oshiBudget)state.settings.oshiBudget=oshiBudget;if(flexibleBudget)state.settings.flexibleBudget=flexibleBudget;const ln=document.getElementById('liveName');const ld=document.getElementById('liveDate');if(ln)state.settings.liveName=ln.value.trim();if(ld)state.settings.liveDate=ld.value;save();render();switchPage('home');}
function saveLiveSettings(){state.settings.liveName=document.getElementById('liveName').value.trim();state.settings.liveDate=document.getElementById('liveDate').value;save();render();switchPage('home');}
function clearLiveSettings(){state.settings.liveName='';state.settings.liveDate='';save();render();}
function clearGoal(){if(confirm('この月の貯金目標と予算を削除しますか？')){state.monthGoals=state.monthGoals||{};delete state.monthGoals[state.ym];save();render();}}
function backup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});download(blob,'mei-kakeibo-backup.json')}
function exportCSV(){const header='type,date,category,amount,memo,account,fromAccount,toAccount\n';const body=state.entries.map(e=>[e.type,e.date,e.cat,e.amount,e.memo,e.account,e.fromAccount,e.toAccount].map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');download(new Blob([header+body],{type:'text/csv'}),'mei-kakeibo.csv')}
function restoreJSON(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save();render();alert('復元しました。')}catch(e){alert('復元できませんでした。')}};r.readAsText(f)}
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}

function handleInputCategoryClick(ev){const inputPage=document.getElementById('input');const btn=ev.target.closest('button[data-action]');if(!btn||!inputPage||!inputPage.contains(btn))return;const action=btn.dataset.action;const group=btn.dataset.group||'';const name=btn.dataset.name||'';if(['switch-category-tab','toggle-category-add','toggle-category-edit','select-category','edit-category','delete-category','save-category','cancel-category','confirm-delete-category','cancel-delete-category','add-expense-category','add-income-category'].includes(action)){ev.preventDefault();}
 if(action==='switch-category-tab'){ev.stopPropagation();state.selectedCatTab=btn.dataset.tab||'すべて';state.categoryEditing=null;state.pendingCatDelete=null;state.categoryAddOpen=false;renderInput();return;}
 if(action==='toggle-category-add'){ev.stopPropagation();state.categoryAddOpen=!state.categoryAddOpen;renderInput();return;}
 if(action==='toggle-category-edit')return toggleCategoryEditMode(ev);
 if(action==='select-category')return selectCategoryButton(ev,btn);
 if(action==='edit-category')return startCategoryEdit(ev,group,name);
 if(action==='delete-category')return askDeleteCategory(ev,group,name);
 if(action==='save-category')return saveCategoryEdit(ev,group,name);
 if(action==='cancel-category')return cancelCategoryEdit(ev);
 if(action==='confirm-delete-category')return deleteCategoryConfirmed(ev,group,name);
 if(action==='cancel-delete-category')return cancelDeleteCategory(ev);
 if(action==='add-expense-category')return addCustomCategory(ev);
 if(action==='add-income-category')return addIncomeCategory(ev);
}
const inputPageForCategoryEvents=document.getElementById('input');if(inputPageForCategoryEvents&&!inputPageForCategoryEvents.dataset.categoryEventsBound){inputPageForCategoryEvents.addEventListener('click',handleInputCategoryClick);inputPageForCategoryEvents.dataset.categoryEventsBound='1';}

window.toggleCategoryEditMode=toggleCategoryEditMode;
window.selectCategoryButton=selectCategoryButton;
window.startCategoryEdit=startCategoryEdit;
window.saveCategoryEdit=saveCategoryEdit;
window.cancelCategoryEdit=cancelCategoryEdit;
window.askDeleteCategory=askDeleteCategory;
window.cancelDeleteCategory=cancelDeleteCategory;
window.deleteCategoryConfirmed=deleteCategoryConfirmed;
window.addCustomCategory=addCustomCategory;
window.addIncomeCategory=addIncomeCategory;
window.handleInputCategoryClick=handleInputCategoryClick;
window.toggleAccountBudgetTarget=toggleAccountBudgetTarget;
window.renderBuyCheckResult=renderBuyCheckResult;
window.addTransfer=addTransfer;
load();render();
</script>
</body></html>
